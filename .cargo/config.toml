[target.aarch64-apple-darwin]
# macOS ARM64 - requires macOS SDK (skip on Linux)

[target.x86_64-apple-darwin]  
# macOS Intel - requires macOS SDK (skip on Linux)

[target.x86_64-unknown-linux-gnu]
linker = "gcc"  # Use native gcc for native builds
rustflags = ["-C", "target-cpu=generic"]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-unknown-linux-gnu-gcc"
rustflags = [
    "-C", "target-cpu=generic",
    "-C", "relocation-model=pic"
]

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static-libgcc",
    "-C", "link-arg=-static-libstdc++",
    "-C", "link-arg=-Wl,-Bstatic",
    "-C", "link-arg=-lpthread",
    "-C", "link-arg=-Wl,-Bdynamic"
]



[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "target-feature=+bulk-memory",
    "-C", "target-feature=+multivalue", 
    "-C", "target-feature=+mutable-globals",
    "-C", "target-feature=+reference-types",
    "-C", "target-feature=+sign-ext",
    "-C", "opt-level=2",
    "-C", "panic=abort",
    "--cfg", "web_sys_unstable_apis",
    "--cfg", "getrandom_js",
]

[target.wasm32-wasi]
rustflags = [
    "-C", "target-feature=+bulk-memory",
    "-C", "target-feature=+multivalue",
    "-C", "target-feature=+mutable-globals", 
    "-C", "target-feature=+reference-types",
    "-C", "target-feature=+sign-ext",
    "-C", "opt-level=2",
]
