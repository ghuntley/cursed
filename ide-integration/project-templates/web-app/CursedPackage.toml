[package]
name = "cursed-web-app"
version = "0.1.0"
authors = ["{{AUTHOR_NAME}} <{{AUTHOR_EMAIL}}>"]
description = "A modern web application built with CURSED"
license = "MIT OR Apache-2.0"
keywords = ["web", "api", "server", "cursed"]
categories = ["web-programming"]
repository = "https://github.com/{{GITHUB_USERNAME}}/{{PROJECT_NAME}}"
homepage = "https://{{PROJECT_NAME}}.example.com"
documentation = "https://docs.{{PROJECT_NAME}}.example.com"

[dependencies]
# Core web framework
httpz = "2.1.0"
jsonz = "1.0.0"
routerz = "1.2.0"

# Database and storage
dbz = "1.5.0"
sqlz = "2.0.0"
redisz = "1.3.0"

# Authentication and security
authz = "1.1.0"
cryptz = "2.2.0"
jwtiz = "1.0.0"

# Utilities
stringz = "1.0.0"
timez = "1.1.0"
logz = "1.2.0"
configz = "1.0.0"

# Testing
testz = "1.0.0"

[dev-dependencies]
benchz = "1.0.0"
mockz = "1.0.0"

[build]
optimization = "release-fast"
target = "native"

[features]
default = ["web", "database", "auth"]
web = ["httpz", "jsonz", "routerz"]
database = ["dbz", "sqlz", "redisz"]
auth = ["authz", "cryptz", "jwtiz"]
metrics = ["metricz"]
websockets = ["wsz"]

[profile.dev]
optimization = "debug"
debug_info = true

[profile.release]
optimization = "release-fast"
lto = true
debug_info = false

[profile.test]
optimization = "debug"
debug_info = true

[scripts]
dev = "cursed-zig --optimize=debug src/main.💀"
build = "cursed-zig --compile --optimize=release-fast src/main.💀"
test = "cursed-zig test"
fmt = "cursed-fmt src/"
lint = "cursed-lint src/"
doc = "cursed-doc generate"
serve = "cursed-zig --optimize=debug src/main.💀 --serve"
