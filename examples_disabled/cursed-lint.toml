# CURSED Linter Configuration File
# 
# This file demonstrates various configuration options for the CURSED linter.
# Save this as `.cursed-lint.toml` in your project root to customize linting behavior.

[general]
# Use strict linting rules (more aggressive checking)
strict_mode = false

# Maximum line length before triggering warnings
max_line_length = 100

# Maximum function length (number of lines)
max_function_length = 50

# Maximum number of function parameters
max_function_parameters = 6

# Maximum cognitive complexity score
max_cognitive_complexity = 15

# Require documentation comments for public functions
require_documentation = false

[naming]
# Enforce naming conventions for identifiers
enforce_naming_conventions = true

[analysis]
# Check for unused variables
check_unused_variables = true

# Check for unused imports
check_unused_imports = true

[disabled_rules]
# List of rules to disable completely
rules = [
    # "line_too_long",
    # "trailing_whitespace",
    # "single_letter_variable",
]

[custom_rules]
# Enable custom or experimental rules
# custom_rule_name = true

[categories]
# Enable/disable entire categories of rules
style = true
naming = true
gen_z_slang = true
performance = true
complexity = true
deprecated = true
security = true
correctness = true

[output]
# Default output format (human, json, compact, checkstyle)
format = "human"

# Show statistics summary
show_stats = true

# Use colored output
use_colors = true

# Only show errors and warnings (suppress suggestions)
quiet = false

# Show all issues including info level
verbose = false

[presets]
# Pre-defined configuration presets

[presets.strict]
strict_mode = true
max_line_length = 80
max_function_length = 30
max_function_parameters = 4
max_cognitive_complexity = 10
require_documentation = true
enforce_naming_conventions = true
check_unused_variables = true
check_unused_imports = true

[presets.relaxed]
strict_mode = false
max_line_length = 120
max_function_length = 100
max_function_parameters = 10
max_cognitive_complexity = 25
require_documentation = false
enforce_naming_conventions = false
check_unused_variables = false
check_unused_imports = false

[presets.minimal]
# Only check for correctness issues
strict_mode = false
max_line_length = 200
check_unused_variables = false
check_unused_imports = false
enforce_naming_conventions = false
disabled_rules = [
    "line_too_long",
    "trailing_whitespace", 
    "single_letter_variable",
    "generic_function_name",
    "long_comment",
    "long_string_literal",
]
