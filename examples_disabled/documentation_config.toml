# CURSED Documentation Configuration
# =================================
# Configuration file for the CURSED documentation generation system.
# This file controls how documentation is generated, formatted, and output.

[project]
# Project metadata
name = "CURSED Programming Language"
version = "1.0.0"
description = "A complete programming language with Gen Z slang syntax that proves programming can be both fun and powerful"
authors = ["CURSED Language Team"]
homepage = "https://cursed-lang.org"
repository = "https://github.com/ghuntley/cursed"
license = "MIT"

[paths]
# Source and output directories
source_dirs = ["src", "examples"]
output_dir = "docs/generated"

[formats]
# Output formats to generate
html = true
markdown = true
json = false
xml = false
latex = false

[options]
# Documentation generation options
include_private = false
include_source = true
generate_cross_refs = true
generate_search_index = true
include_examples = true
max_type_depth = 10
include_dependencies = false

[styling]
# HTML styling and theming
theme = "auto"  # "light", "dark", or "auto"
custom_css = []
template_dir = ""
favicon = ""
logo = ""

[styling.colors]
# Custom color scheme (optional)
# primary = "#ff6b9d"
# secondary = "#4ecdc4"
# accent = "#45b7d1"

[generation]
# Advanced generation settings
concurrent_workers = 4
cache_enabled = true
incremental = true
verbose_logging = false

[filters]
# Content filtering options
exclude_patterns = [
    "target/**",
    "node_modules/**",
    ".git/**",
    "*.tmp",
    "*.temp"
]

include_patterns = [
    "**/*.csd",
    "**/*.cursed",
    "**/README.md",
    "**/docs/**/*.md"
]

[examples]
# Example processing configuration
validate_syntax = true
validate_compilation = false  # Requires working compiler
include_output = false
run_examples = false

[search]
# Search index configuration
enable_fuzzy_search = true
min_word_length = 2
max_results = 50
boost_titles = 2.0
boost_descriptions = 1.5

[output]
# Output file configuration
compress_html = true
minify_css = true
generate_sitemap = true
generate_rss = false

[markdown]
# Markdown-specific options
table_of_contents = true
syntax_highlighting = true
math_rendering = false
mermaid_diagrams = true

[html]
# HTML-specific options
responsive_design = true
mobile_optimized = true
offline_support = false
progressive_web_app = false

[html.navigation]
# Navigation configuration
breadcrumbs = true
sidebar = true
search_box = true
back_to_top = true

[html.footer]
# Footer configuration
show_generated_time = true
show_generator_info = true
custom_footer = ""

[validation]
# Content validation settings
check_links = false
check_images = false
validate_html = true
lint_markdown = false

[performance]
# Performance optimization
parallel_processing = true
memory_limit_mb = 512
timeout_seconds = 300
cache_size_mb = 100

[logging]
# Logging configuration
level = "info"  # "trace", "debug", "info", "warn", "error"
output = "stdout"  # "stdout", "stderr", "file"
file_path = "docs.log"
structured = false

[experimental]
# Experimental features (use with caution)
ai_summaries = false
auto_examples = false
smart_linking = false
live_reload = false
