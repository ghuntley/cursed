# Compact configuration for space-efficient code
# Good for projects with screen space constraints

[formatting]
line_width = 120
tab_size = 2
trailing_commas = false
function_args_layout = "never"
struct_layout = "never"
align_assignments = false
sort_imports = true
group_imports = false

[comments]
align_inline_comments = false
comment_width = 120

[newlines]
blank_lines_after_imports = 0
blank_lines_between_functions = 1
blank_lines_in_blocks = 0
max_blank_lines = 1

[strings]
break_long_strings = false
