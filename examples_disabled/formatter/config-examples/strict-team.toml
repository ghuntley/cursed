# Strict team configuration for consistent code style
# Good for teams that want maximum consistency

[formatting]
line_width = 100
tab_size = 4
use_tabs = false
trailing_commas = true
function_args_layout = "always"
struct_layout = "auto"
align_assignments = true
align_struct_fields = true
sort_imports = true
group_imports = true
break_method_chains = "always"

[comments]
align_inline_comments = true
comment_width = 100
normalize_comment_spacing = true

[newlines]
blank_lines_after_imports = 2
blank_lines_between_functions = 1
max_blank_lines = 1

[strings]
normalize_escapes = true
break_long_strings = true
