[package]
name = "web-server-demo"
version = "0.2.0"
authors = ["CURSED Team <team@cursed-lang.org>"]
description = "Advanced web server demonstrating complex dependency management"
license = "MIT OR Apache-2.0"
repository = "https://github.com/cursed-lang/examples"
documentation = "https://docs.cursed-lang.org/examples/web-server-demo"
keywords = ["web", "server", "http", "async", "database"]
categories = ["web-programming", "network-programming"]
edition = "2024"

[dependencies]
# Web framework with async support
web_framework = { version = "^3.1.0", features = ["async", "middleware", "json"] }

# Database connectivity 
database_driver = { version = "^2.0.0", features = ["async", "migrations"] }

# JSON serialization
json_utils = "^2.1.0"

# Logging
log_manager = { version = "^1.5.0", features = ["structured", "async"] }

# Configuration management
config_parser = "^1.2.0"

# Authentication (optional feature)
auth_provider = { version = "^1.8.0", optional = true, features = ["jwt", "bcrypt"] }

# Caching (optional feature)
cache_manager = { version = "^2.2.0", optional = true, features = ["redis", "memory"] }

# Metrics collection (optional feature)
metrics_collector = { version = "^0.9.0", optional = true }

[dev-dependencies]
# Testing framework
test_framework = "^2.0.0"

# HTTP client for integration tests
http_client = { version = "^1.3.0", features = ["json", "async"] }

# Mock server for testing
mock_server = "^1.1.0"

# Benchmarking tools
benchmark_suite = "^0.7.0"

[build-dependencies]
# Code generation for API endpoints
api_codegen = "^1.0.0"

# Database schema migration generator
migration_generator = "^2.1.0"

[features]
default = ["basic"]

# Feature definitions
basic = []
auth = ["auth_provider"]
caching = ["cache_manager"] 
monitoring = ["metrics_collector"]
full = ["auth", "caching", "monitoring"]

# Development features
dev = ["auth", "caching"]
production = ["full"]

[[bin]]
name = "web-server"
path = "src/bin/server.csd"
required-features = []

[[bin]]
name = "db-migrate"
path = "src/bin/migrate.csd"
required-features = []

[lib]
name = "web_server_demo"
path = "src/lib.csd"

# Build profiles for different scenarios
[profiles.dev]
optimization = "none"
debug = true

[profiles.release]
optimization = "max"
debug = false
strip = true

[profiles.production]
inherits = "release"
optimization = "size"
debug = false
