[package]
name = "simple-math-app"
version = "0.1.0"
authors = ["CURSED Developer <dev@cursed-lang.org>"]
description = "A simple calculator app demonstrating basic dependency usage"
license = "MIT"
repository = "https://github.com/cursed-lang/examples"
keywords = ["example", "calculator", "math"]
categories = ["command-line-interface", "mathematics"]
edition = "2024"

[dependencies]
# Single dependency - a math utilities library
math_utils = "1.0.0"

[[bin]]
name = "calculator"
path = "src/main.csd"
