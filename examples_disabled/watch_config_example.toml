# CURSED File Watcher Configuration Example
# This file demonstrates comprehensive configuration options
# for the CURSED file watching system

[project]
name = "cursed-watch-example"
version = "0.1.0"

# Basic file watching configuration
[watch]
# File patterns to monitor for changes
# Use glob patterns with * wildcards
watch_patterns = [
    "*.csd",              # CURSED source files
    "*.toml",             # Configuration files
    "*.md",               # Documentation files
    "Makefile",           # Build files
    "src/**/*.csd",       # All CURSED files in src directory recursively
    "examples/**/*.csd",  # Example programs
    "tests/**/*.rs",      # Test files (mixed projects)
    "docs/**/*.md",       # All documentation
]

# Patterns to ignore (higher priority than watch_patterns)
ignore_patterns = [
    "*.tmp",              # Temporary files
    "*.bak",              # Backup files
    "*.log",              # Log files
    "*.swp",              # Vim swap files
    "*~",                 # Editor backup files
    "target/*",           # Build artifacts
    ".git/*",             # Git repository files
    ".devenv/*",          # Development environment
    "coverage/*",         # Coverage reports
    "node_modules/*",     # JavaScript dependencies
    ".DS_Store",          # macOS system files
    "Thumbs.db",          # Windows system files
]

# Debounce duration in milliseconds
# Prevents rapid-fire events from overwhelming the system
debounce_duration = 500

# Maximum number of events to batch together for processing
max_batch_size = 50

# Size of the event buffer (helps with burst events)
event_buffer_size = 1000

# Whether to watch directories recursively
recursive = true

# Whether to follow symbolic links (use with caution)
follow_symlinks = false

# Build automation settings
[watch.build]
# Automatically trigger builds on file changes
auto_build = true

# Build profile to use for auto-builds
build_profile = "debug"

# Clean build on configuration changes
clean_on_config_change = true

# Incremental compilation when possible
incremental = true

# Show build progress during watch mode
show_progress = true

# Test automation settings
[watch.test]
# Automatically run tests on source changes
auto_test = true

# Run only tests related to changed files
run_related_only = false

# Run tests in parallel
parallel = true

# Generate coverage reports
coverage = false

# Test pattern matching
test_patterns = [
    "tests/**/*_test.rs",
    "tests/**/*_test.csd",
]

# Code quality automation
[watch.quality]
# Automatically format code on save
auto_format = false

# Run linter on file changes
auto_lint = false

# Fix linting issues automatically (where possible)
auto_fix = false

# Check for security issues
security_check = false

# Documentation automation
[watch.docs]
# Automatically regenerate documentation
auto_generate = false

# Update API documentation on source changes
update_api_docs = true

# Rebuild static site on markdown changes
rebuild_site = false

# Development server settings
[watch.dev_server]
# Enable hot reload for web applications
hot_reload = true

# Port for development server
port = 8080

# Host for development server
host = "localhost"

# Automatically open browser on start
open_browser = false

# Performance tuning for different project sizes
[watch.performance]
# Configuration for small projects (< 100 files)
[watch.performance.small]
debounce_duration = 100
max_batch_size = 10
event_buffer_size = 100

# Configuration for medium projects (100-1000 files)
[watch.performance.medium]
debounce_duration = 300
max_batch_size = 25
event_buffer_size = 500

# Configuration for large projects (1000+ files)
[watch.performance.large]
debounce_duration = 1000
max_batch_size = 100
event_buffer_size = 2000

# Environment-specific configurations
[watch.environments]
# Development environment (fast feedback)
[watch.environments.development]
debounce_duration = 200
auto_build = true
auto_test = true
auto_format = true
verbose = true

# Production environment (stable builds)
[watch.environments.production]
debounce_duration = 1000
auto_build = true
auto_test = true
clean_on_config_change = true
security_check = true

# CI environment (comprehensive checking)
[watch.environments.ci]
debounce_duration = 500
auto_build = true
auto_test = true
auto_lint = true
coverage = true
parallel = true

# Platform-specific settings
[watch.platforms]
# Linux-specific settings
[watch.platforms.linux]
# inotify-specific optimizations
use_inotify = true
inotify_max_watches = 524288

# macOS-specific settings  
[watch.platforms.macos]
# FSEvents-specific optimizations
use_fsevents = true
fsevents_latency = 0.1

# Windows-specific settings
[watch.platforms.windows]
# ReadDirectoryChangesW optimizations
use_windows_api = true
buffer_size = 65536

# Custom action definitions
[watch.actions]
# Custom action for SCSS compilation
[watch.actions.compile_scss]
patterns = ["*.scss", "*.sass"]
command = "sass {file} {output}.css"
description = "Compile SCSS to CSS"

# Custom action for JavaScript bundling
[watch.actions.bundle_js]
patterns = ["src/**/*.js"]
command = "webpack --mode development"
description = "Bundle JavaScript modules"

# Custom action for image optimization
[watch.actions.optimize_images]
patterns = ["assets/**/*.{png,jpg,jpeg,gif,svg}"]
command = "imagemin {file} --out-dir=assets/optimized"
description = "Optimize images"

# Notification settings
[watch.notifications]
# Enable desktop notifications
desktop = true

# Enable sound notifications
sound = false

# Show notifications for successful builds
on_success = true

# Show notifications for build failures
on_failure = true

# Show notifications for test results
on_test_results = true

# Logging configuration
[watch.logging]
# Log level (trace, debug, info, warn, error)
level = "info"

# Log file path (optional)
file = "logs/file_watcher.log"

# Include timestamps in logs
timestamps = true

# Include file paths in logs
include_paths = true

# Maximum log file size before rotation
max_size = "10MB"

# Number of log files to keep
keep_files = 5

# Integration with external tools
[watch.integrations]
# Git integration
[watch.integrations.git]
# Run pre-commit hooks on file changes
pre_commit = false

# Check for uncommitted changes
check_uncommitted = false

# Automatically stage formatted files
auto_stage = false

# Editor integration
[watch.integrations.editor]
# Send notifications to editor
notify_editor = false

# Update editor with compilation errors
send_errors = true

# Language server integration
language_server = true

# Advanced filtering rules
[watch.filters]
# File size limits
max_file_size = "1MB"
min_file_size = "1B"

# File age limits (ignore very old files)
max_age_days = 365

# Exclude hidden files
exclude_hidden = true

# Exclude binary files
exclude_binary = true

# Custom filter expressions
custom_filters = [
    "!*.{exe,dll,so,dylib}",  # Exclude binary executables
    "!*.{zip,tar,gz,bz2}",    # Exclude archives
    "size < 10MB",            # Exclude very large files
]

# Experimental features
[watch.experimental]
# Use memory-mapped file watching (faster for large projects)
memory_mapped = false

# Predictive pre-compilation based on editing patterns
predictive_compile = false

# Machine learning-based relevance scoring
ml_relevance = false

# Watch for changes in dependencies
dependency_watching = false
