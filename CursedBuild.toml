# CURSED Build Configuration for the CURSED Compiler Project
# This is an example configuration for a typical CURSED project

[project]
name = "cursed_compiler"
version = "1.0.0"
authors = ["CURSED Team"]
description = "The CURSED programming language compiler"
license = "MIT"
repository = "https://github.com/cursed/cursed"
homepage = "https://cursed-lang.org"

[build]
# Main build targets
targets = ["cursed", "cursed_build", "cursed_test", "cursed_fmt"]

# Source directories to search for code
source_dirs = ["src", "stdlib"]

# Output directory for build artifacts
output_dir = "build"

# Optimization level (0-3)
optimization_level = "2"

# Enable parallel builds
parallel_builds = true

# Enable build caching
cache_enabled = true

# Default build mode: "native", "interpret", or "wasm"
build_mode = "native"

# Compiler flags
compiler_flags = ["--enable-optimization", "--debug-info"]

[dependencies]
# Core dependencies (these would be in stdlib)
testz = "1.0.0"
json_tea = "1.0.0"
stringz = "1.0.0"
fs = "1.0.0"
pathing = "1.0.0"
timez = "1.0.0"
dropz = "1.0.0"
concurrenz = "1.0.0"
exec_slay = "1.0.0"

[build_dependencies]
# Dependencies only needed at build time
macro_processor = "1.0.0"
code_generator = "1.0.0"

[testing]
# Test file patterns to discover
test_patterns = ["test_*.💀", "*_test.💀", "tests/*.💀"]

# Parallel test execution
parallel_tests = true

# Test timeout (seconds)
test_timeout = 30

# Test output format: "standard", "json", "xml"
output_format = "standard"

[targets]
# Main compiler target
[targets.cursed]
main = "src/main.💀"
build_mode = "native"
optimization_level = "3"

# Build system target
[targets.cursed_build]
main = "src/bin/cursed_build.💀"
build_mode = "native"
optimization_level = "2"

# Test runner target
[targets.cursed_test]
main = "src/bin/cursed_test.💀"
build_mode = "native"

# Formatter target
[targets.cursed_fmt]
main = "src/bin/cursed_fmt.💀"
build_mode = "native"

[scripts]
# Pre-build scripts
pre_build = "echo 'Starting CURSED build...'"

# Post-build scripts
post_build = "echo 'CURSED build complete!'"

# Pre-test scripts
pre_test = "echo 'Running CURSED tests...'"

# Post-test scripts
post_test = "echo 'CURSED tests complete!'"

# Custom scripts
bootstrap = "cargo run --bin cursed -- compile src/bootstrap/main.💀"
self_host = "cargo run --bin cursed -- compile --self-host src/main.💀"

[env]
# Environment variables for builds
CURSED_DEBUG = "0"
CURSED_LOG_LEVEL = "info"
CURSED_CACHE_DIR = "~/.cursed/cache"

[package]
# Package metadata for publishing
keywords = ["compiler", "programming-language", "systems"]
categories = ["development-tools", "compilers"]
exclude = ["target/", "*.log", ".git/"]
include = ["src/", "stdlib/", "README.md", "LICENSE"]

[features]
# Feature flags
default = ["std", "optimization", "parallel"]
std = []
optimization = []
parallel = []
self_hosting = []
wasm_target = []
debug_info = []

[workspace]
# Workspace configuration for multi-package projects
members = ["stdlib/*", "tools/*", "examples/*"]
exclude = ["target", "build"]

[profile]
# Build profiles
[profile.dev]
optimization_level = "0"
debug_info = true
parallel_builds = true

[profile.release]
optimization_level = "3"
debug_info = false
parallel_builds = true
lto = true

[profile.test]
optimization_level = "1"
debug_info = true
parallel_builds = true
