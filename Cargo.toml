[package]
name = "cursed"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "cursed"
path = "src/main.rs"

[workspace]
# This is a standalone package

[features]
default = ["std", "networking", "ffi"]
std = []
networking = ["tokio", "mio"]
ffi = ["libc"]
wasm = ["wasm-bindgen", "js-sys", "web-sys"]
crypto-ring = ["ring"]
crypto-rustcrypto = ["sha2", "blake3", "sha3", "hmac", "pbkdf2", "scrypt", "argon2", "bcrypt", "ed25519-dalek", "aes", "aes-gcm"]

[build-dependencies]
regex = "1.10"
base64 = "0.22"
hex = "0.4"
rand = "0.8"
subtle = "2.5.0"
base64ct = "=1.6.0"
chrono = { version = "0.4", features = ["serde"] }
lazy_static = "1.4"

# Conditional build dependencies
libc = { version = "0.2", optional = true }

# Crypto dependencies - use RustCrypto by default, ring on native when available
sha2 = { version = "0.10", optional = true }
blake3 = { version = "1.5", optional = true }
sha3 = { version = "0.10", optional = true }
hmac = { version = "0.12", optional = true }
pbkdf2 = { version = "0.12", optional = true }
scrypt = { version = "0.11", optional = true }
argon2 = { version = "0.5", optional = true }
bcrypt = { version = "0.15", optional = true }
ed25519-dalek = { version = "2.0", optional = true }
aes = { version = "0.8", optional = true }
aes-gcm = { version = "0.10", optional = true }

[dependencies]
regex = "1.10"
base64 = "0.22"
hex = "0.4"
rand = "0.8"
subtle = "2.5.0"
base64ct = "=1.6.0"
chrono = { version = "0.4", features = ["serde"] }
lazy_static = "1.4"

# Platform-specific dependencies for native targets
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libc = "0.2"
llvm-sys = "181"
tokio = { version = "1.0", features = ["full"], optional = true }
mio = { version = "0.8", optional = true }
# Native targets can use ring for crypto
ring = { version = "0.17", optional = true }

# WASM-specific dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", features = [
  "console",
  "Performance",
  "Window",
  "Worker",
], optional = true }
wasi = "0.11"

# Crypto dependencies available on both native and WASM
sha2 = { version = "0.10", optional = true }
blake3 = { version = "1.5", optional = true }
sha3 = { version = "0.10", optional = true }
hmac = { version = "0.12", optional = true }
pbkdf2 = { version = "0.12", optional = true }
scrypt = { version = "0.11", optional = true }
argon2 = { version = "0.5", optional = true }
bcrypt = { version = "0.15", optional = true }
ed25519-dalek = { version = "2.0", optional = true }
aes = { version = "0.8", optional = true }
aes-gcm = { version = "0.10", optional = true }
