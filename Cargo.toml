[package]
name = "cursed"
version = "0.1.0"
edition = "2021"
authors = ["Geoffrey Huntley"]
description = "CURSED Programming Language - Gen Z slang meets Go-like grammar (Minimal Build)"
repository = "https://github.com/ghuntley/cursed"
license = "MIT"
readme = "README.md"

[lints.rust]
missing_docs = "allow"
unused_imports = "allow"
unused_variables = "allow"
dead_code = "allow"
unused_assignments = "allow"
unused_unsafe = "allow"
unused_mut = "allow"

# Minimal core dependencies for basic compiler functionality
[dependencies]
thiserror = "1.0"  # For ergonomic error handling
clap = { version = "4.4", features = ["derive"] }  # For command-line argument parsing
log = "0.4"  # Logging facade
env_logger = "0.10"  # Logging implementation
num-traits = "0.2"  # For numerical traits
num_cpus = "1.16"    # For detecting CPU core count
libc = "0.2"  # For C functions like strlen
inkwell = { version = "0.4", features = ["llvm17-0"] }  # LLVM bindings

# Basic serialization
serde = { version = "1.0", features = ["derive"] }  
serde_json = "1.0" 
toml = "0.8"        

# Basic cryptography for core functionality only
getrandom = "0.2"  # Secure random number generation
hex = "0.4"     # Hex encoding/decoding
sha2 = "0.10"   # SHA-2 hashing for build cache

# Essential system interaction
nix = { version = "0.27", features = ["process", "signal"] }  # Basic Unix system calls
parking_lot = "0.12"  # Better RwLock implementation
once_cell = "1.17"  # Lazy static initialization

# Structured logging (minimal)
tracing = { version = "0.1", features = ["attributes"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Basic error handling
backtrace = "0.3.69"  # For stack trace capture
rustc-demangle = "0.1"  # For demangling Rust symbols
either = "=1.9.0"  # Pin to working version (1.15 has compilation issues)

# Essential utilities
walkdir = "2.4"  # Recursive directory traversal
glob = "0.3"    # For file path pattern matching
dirs = "5.0"    # System directory utilities

# Critical missing dependencies for compilation errors
rand = "0.8"  # Random number generation (critical)
regex = "1.10"  # Pattern matching (critical)
sha3 = "0.10"  # SHA-3 cryptographic hashing (critical)
hmac = "0.12"  # HMAC authentication codes (critical)
base64 = "0.21"  # Base64 encoding/decoding (critical)
# tokio = { version = "1.0", features = ["rt", "rt-multi-thread", "macros", "io-util", "net", "time", "fs", "sync"] }  # Async runtime (critical) - DISABLED due to E0753 errors

# Additional missing dependencies found in compilation
libloading = "0.8"  # Dynamic library loading
serde_yaml = "0.9"  # YAML serialization
zstd = "0.13"  # ZSTD compression
httpdate = "1.0"  # HTTP date formatting
urlencoding = "2.1"  # URL encoding/decoding
cbc = "0.1"  # CBC mode for block ciphers
flate2 = "1.0"  # Compression library
brotli = "3.3"  # Brotli compression
rayon = "1.8"  # Data parallelism
uuid = { version = "1.6", features = ["v4"] }  # UUID generation
chacha20poly1305 = "0.10"  # ChaCha20-Poly1305 AEAD encryption
rand_chacha = "0.3"  # ChaCha random number generator
rand_distr = "0.4"  # Random distributions

# Critical missing dependencies for compilation errors (newly added)
rusqlite = "0.30"  # SQLite database interface
# tokio = { version = "1.0", features = ["rt", "rt-multi-thread", "macros", "io-util", "net", "time", "fs", "sync", "process"] }  # Async runtime - DISABLED due to E0753 doc comment errors
# tokio-postgres = "0.7"  # PostgreSQL async client - DISABLED (requires tokio)
bincode = "1.3"  # Binary serialization
chrono = { version = "0.4", features = ["serde"] }  # Date and time handling
# bb8 = "0.8"  # Connection pooling - DISABLED (requires tokio)
# bb8-postgres = "0.8"  # PostgreSQL connection pooling - DISABLED (requires tokio)
md5 = "0.7"  # MD5 hashing

# Additional missing numeric dependencies
num-bigint = { version = "0.4", features = ["rand"] }  # Big integer arithmetic
num-rational = "0.4"  # Rational numbers
num-complex = "0.4"  # Complex numbers  
num-integer = "0.1"  # Integer utilities

# Critical crypto dependencies (safe to include)
rsa = { version = "0.9", features = ["sha2"] }  # RSA cryptography
p256 = { version = "0.13", features = ["ecdh"] }  # P-256 elliptic curve
p384 = { version = "0.13", features = ["ecdh"] }  # P-384 elliptic curve  
p521 = { version = "0.13", features = ["ecdh"] }  # P-521 elliptic curve
k256 = "0.13"  # secp256k1 curve
ecdsa = "0.16"  # ECDSA signatures
ed25519-dalek = "2.0"  # Ed25519 signatures
x25519-dalek = "2.0"  # X25519 key exchange
curve25519-dalek = "4.1"  # Curve25519 operations
elliptic-curve = "0.13"  # Elliptic curve traits
x509-parser = "0.16"  # X.509 certificate parsing

# Critical async-less utilities  
lazy_static = "1.4"  # Lazy static initialization
url = "2.4"  # URL parsing and manipulation

# Additional crypto dependencies
aes = "0.8"  # AES encryption
aes-gcm = "0.10"  # AES-GCM mode
chacha20 = "0.9"  # ChaCha20 cipher
pqcrypto-traits = "0.3"  # Post-quantum crypto traits

# Database connection pooling (minimal features)
bb8 = { version = "0.8", default-features = false }  # Connection pooling without tokio

