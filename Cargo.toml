[package]
name = "cursed"
version = "0.1.0"
edition = "2021"
authors = ["Geoffrey Huntley"]
description = "CURSED Programming Language - Gen Z slang meets Go-like grammar"
repository = "https://github.com/ghuntley/cursed"
license = "MIT"
readme = "README.md"

[lints.rust]
missing_docs = "allow"
unused_imports = "allow"
unused_variables = "allow"
dead_code = "allow"
unused_assignments = "allow"
unused_unsafe = "allow"
unused_mut = "allow"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
thiserror = "1.0"  # For ergonomic error handling
clap = { version = "4.4", features = ["derive"] }  # For command-line argument parsing
rustyline = "12.0"  # For REPL functionality
log = "0.4"  # Logging facade
env_logger = "0.10"  # Logging implementation
dirs = "5.0"  # For finding home directory
num-traits = "0.2"  # For numerical traits
libc = "0.2"  # For C functions like strlen
inkwell = { version = "0.4", features = ["llvm17-0"] } # LLVM bindings

# Basic cryptography dependencies
hex = "0.4"     # Hex encoding/decoding
rand = "0.8"    # Random number generation
sha2 = "0.10"   # SHA-2 hashing for build cache
base64 = "0.21" # Base64 encoding/decoding for database binary data
hmac = "0.12"   # HMAC message authentication

# Regex support
regex = "1.10"  # Regular expression support

# Terminal support
atty = "0.2"    # TTY detection
walkdir = "2.4"  # Recursive directory traversal
once_cell = "1.17"  # Lazy static initialization
lazy_static = "1.4"  # Lazy static initialization support
serde = { version = "1.0", features = ["derive"] }  # Serialization framework
serde_json = "1.0"  # JSON serialization/deserialization
serde_yaml = "0.9"  # YAML serialization/deserialization
toml = "0.8"  # TOML serialization/deserialization
chrono = { version = "0.4", features = ["serde"] }  # Date and time handling
bincode = "1.3"  # Binary serialization for profiling data
thread_local = "1.1"  # Thread-local storage
parking_lot = "0.12"  # Better RwLock implementation with timeout support

# Memory profiling
backtrace = "0.3.69"  # For stack trace capture

# Glob pattern matching
glob = "0.3"    # For file path pattern matching

# Cache implementation
lru = "0.10.0"  # LRU cache implementation

# Structured logging
tracing = "0.1"  # Structured logging framework
tracing-subscriber = { version = "0.3", features = ["env-filter"] }  # Subscriber implementation

# System information
num_cpus = "1.16"  # For detecting CPU cores

# Date and time handling

hostname = "0.4.1"

# For the bootstrap verification system
# sha2 already included above for cryptography
tempfile = "3.8"  # Temporary directories for testing

# Documentation generation dependencies
pulldown-cmark = "0.9"  # Markdown parsing and HTML generation
handlebars = "4.4"      # Template engine for HTML generation

# Package management dependencies (simplified for now)
semver = "1.0"          # Semantic version parsing and comparison
url = "2.4"             # URL parsing and manipulation

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Missing dependencies for web_vibez
uuid = { version = "1.0", features = ["v4", "serde"] }      # For request IDs
urlencoding = "2.1"                                # For URL encoding/decoding
httpdate = "1.0"                                   # For HTTP date formatting  
async-trait = "0.1"                                # For async traits

# Language Server Protocol dependencies
tower-lsp = "0.20"         # LSP server framework
tower = "0.4"             # Service trait and utilities
dashmap = "5.5"           # Concurrent HashMap for document storage
ropey = "1.6"             # Rope data structure for efficient text editing
tree-sitter = "0.20"      # Tree-sitter parsing for incremental updates

[features]
# Enable binary compilation support
binary_compiler = []
# Enable enhanced dynamic dispatch for interfaces
enhanced_dynamic_dispatch = []
# Enable concurrent garbage collection
concurrent_gc = []

[dev-dependencies]
criterion = "0.5"  # For benchmarking
pretty_assertions = "1.4"  # For nicer test output
proptest = "1.3"  # For property-based testing
rand = "0.8.5"  # For randomization in tests
tempfile = "3.8"  # For temporary files in tests
clap = { version = "4.4", features = ["derive"] }  # For command-line argument parsing
tracing-test = "0.2"  # For tracing in tests

[workspace]
members = [
    "."
]

[[bin]]
name = "cursed"
path = "src/main.rs"



[[bin]]
name = "cursed-pkg"
path = "src/bin/cursed_pkg.rs"

[[bin]]
name = "cursed-pkg-simple"
path = "src/bin/cursed_pkg_simple.rs"

[[bin]]
name = "cursed-build"
path = "src/bin/cursed_build.rs"

[[bin]]
name = "cursed-repl"
path = "src/bin/cursed_repl.rs"



[profile.release]
lto = true  # Enable Link Time Optimization for smaller binaries
codegen-units = 1  # Optimize for size and performance
opt-level = 3  # Maximum optimization
panic = "abort"  # Remove panic unwinding code in release builds
strip = true  # Strip symbols from the binary

[profile.dev]
opt-level = 0  # No optimization for faster compilation
debug = true  # Full debug info

[[test]]
name = "jit_integration_tests"
path = "tests/jit_integration_tests.rs"
harness = true

[[test]]
name = "dynamic_worker_sizing_test"
path = "tests/async_constraint_checker/dynamic_worker_sizing_test.rs"

[[bin]]
name = "cursed-debug"
path = "src/bin/cursed_debug.rs"
harness = true

[[bin]]
name = "cursed-lsp"
path = "src/bin/cursed_lsp.rs"
