<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive documentation and learning platform for the CURSED programming language" />
    <meta name="keywords" content="CURSED, programming, language, tutorial, documentation, systems programming" />
    <meta name="author" content="CURSED Language Team" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://docs.cursedlang.org/" />
    <meta property="og:title" content="CURSED Interactive Documentation" />
    <meta property="og:description" content="Learn CURSED with interactive tutorials, comprehensive documentation, and hands-on examples." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://docs.cursedlang.org/" />
    <meta property="twitter:title" content="CURSED Interactive Documentation" />
    <meta property="twitter:description" content="Learn CURSED with interactive tutorials, comprehensive documentation, and hands-on examples." />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet" />
    
    <!-- Theme detection script (prevents flash of unstyled content) -->
    <script>
      (function() {
        const theme = localStorage.getItem('cursed-docs-theme') || 'system';
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme === 'dark' || (theme === 'system' && systemDark);
        
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    
    <title>CURSED Interactive Documentation</title>
  </head>
  <body class="h-full bg-white dark:bg-slate-900 text-slate-900 dark:text-white">
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <div id="root" class="h-full"></div>
    
    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
