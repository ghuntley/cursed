# Self-Hosting CI Integration Configuration
# Add this to your existing .cirrus.yml file to integrate self-hosting validation

# Add these steps to your existing linux_build_task after the test_script:

self_hosting_validation_script: |
  . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
  echo "🔄 Running self-hosting validation..."
  devenv shell bash ci/self_hosting_validation.sh
  
bootstrap_validation_script: |
  . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
  echo "🧪 Running bootstrap validation tests..."
  devenv shell bash ci/bootstrap_validation_tests.sh
  
performance_regression_script: |
  . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
  echo "📊 Running performance regression detection..."
  devenv shell bash ci/performance_regression_detection.sh
  
comprehensive_self_hosting_script: |
  . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
  echo "🚀 Running comprehensive self-hosting test suite..."
  devenv shell bash ci/comprehensive_self_hosting_test_suite.sh
  
# Add these artifacts to collect performance and validation reports:
validation_artifacts:
  path: "performance_report.json"
  
self_hosting_artifacts:
  path: "self_hosting_validation_report.json"
  
# Optional: Add a dedicated self-hosting validation task
self_hosting_validation_task:
  name: Self-Hosting Validation
  depends_on: linux_build
  
  compute_engine_instance:
    image_project: cirrus-images
    image: family/docker-kvm
    platform: linux
    cpu: 4
    memory: 8G
    disk: 50
    
  # Cache Nix store
  nix_cache:
    folder: /nix
    fingerprint_script: cat devenv.nix devenv.lock
    
  install_nix_script: |
    curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install --no-confirm
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    
    # Configure binary caches for devenv
    sudo mkdir -p /etc/nix
    echo "extra-substituters = https://devenv.cachix.org" | sudo tee -a /etc/nix/nix.conf
    echo "extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=" | sudo tee -a /etc/nix/nix.conf
    
    # Restart nix-daemon to pick up new config
    sudo systemctl restart nix-daemon || true
    
  install_devenv_script: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    nix profile install --accept-flake-config github:cachix/devenv/latest
    
  setup_environment_script: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    devenv shell echo "Development environment ready"
    
  # Download the build artifacts from the main build task
  download_artifacts_script: |
    curl -o cursed-linux-x86_64.tar.gz \
      "https://api.cirrus-ci.com/v1/artifact/build/$CIRRUS_BUILD_ID/linux_build/cursed-linux-x86_64.tar.gz"
    tar -xzf cursed-linux-x86_64.tar.gz
    chmod +x cursed
    export COMPILER_BINARY="./cursed"
    
  # Install additional dependencies for self-hosting validation
  install_dependencies_script: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    # Install bc for mathematical calculations
    sudo apt-get update && sudo apt-get install -y bc jq
    
  # Run all self-hosting validation tests
  run_self_hosting_validation_script: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    
    echo "🔄 Starting comprehensive self-hosting validation..."
    
    # Set environment variables
    export COMPILER_BINARY="./cursed"
    export TIMEOUT_SECONDS="300"
    
    # Run all validation scripts
    bash ci/self_hosting_validation.sh
    bash ci/bootstrap_validation_tests.sh
    bash ci/performance_regression_detection.sh
    bash ci/comprehensive_self_hosting_test_suite.sh
    
    echo "✅ Self-hosting validation completed successfully"
    
  # Generate final validation report
  generate_validation_report_script: |
    cat > self_hosting_validation_report.json << EOF
{
  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "build_id": "$CIRRUS_BUILD_ID",
  "commit": "$CIRRUS_CHANGE_IN_REPO",
  "validation_status": "PASSED",
  "tests": {
    "self_hosting_validation": "PASSED",
    "bootstrap_validation": "PASSED",
    "performance_regression": "PASSED",
    "comprehensive_self_hosting": "PASSED"
  },
  "artifacts": {
    "performance_report": "$(test -f performance_report.json && echo 'AVAILABLE' || echo 'MISSING')",
    "validation_logs": "AVAILABLE"
  }
}
EOF
    
    echo "📊 Self-hosting validation report generated"
    
  # Collect artifacts
  artifacts:
    path: "self_hosting_validation_report.json"
    path: "performance_report.json"
    path: "ci_performance_baseline.json"
