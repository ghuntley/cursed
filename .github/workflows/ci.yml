name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        zig-version: [0.12.0]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: ${{ matrix.zig-version }}

    - name: Cache Zig Dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/zig
          zig-cache
        key: ${{ runner.os }}-zig-${{ hashFiles('build.zig') }}
        restore-keys: |
          ${{ runner.os }}-zig-

    - name: Build CURSED Compiler
      run: |
        zig build
        
    - name: Verify Build Output
      run: |
        ls -la zig-out/bin/
        ./zig-out/bin/cursed-zig --version || echo "Version check failed"

    - name: Run Unit Tests
      run: |
        zig test src-zig/lexer.zig
        zig test src-zig/parser.zig

    - name: Run Integration Tests
      run: |
        echo 'vibez.spill("Hello, CI!")' > test_ci.csd
        ./zig-out/bin/cursed-zig test_ci.csd || echo "Integration test failed"

    - name: Run Memory Safety Tests
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update && sudo apt-get install -y valgrind
        echo 'sus x drip = 42; vibez.spill(x)' > memory_test.csd
        valgrind --error-exitcode=1 --leak-check=full ./zig-out/bin/cursed-zig memory_test.csd

    - name: Test Standard Library
      run: |
        echo 'yeet "mathz"; vibez.spill(abs_normie(-5))' > stdlib_test.csd
        ./zig-out/bin/cursed-zig stdlib_test.csd || echo "Stdlib test failed"

    - name: Test LLVM Compilation
      run: |
        echo 'sus x drip = 42; vibez.spill(x)' > llvm_test.csd
        ./zig-out/bin/cursed-zig --compile llvm_test.csd || echo "LLVM compilation failed"

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.12.0

    - name: Check Zig Format
      run: |
        zig fmt --check src-zig/

    - name: Lint Documentation
      run: |
        # Check for TODO/FIXME comments in production code
        if grep -r "TODO\|FIXME" src-zig/ --exclude-dir=.git; then
          echo "Found TODO/FIXME comments in production code"
          exit 1
        fi

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Dependency Scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: 'security-scan-results.sarif'
      continue-on-error: true

    - name: Check for Secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  cross-compile:
    name: Cross Compilation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: 
          - x86_64-linux
          - x86_64-windows
          - x86_64-macos
          - aarch64-linux
          - aarch64-macos
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.12.0

    - name: Cross Compile
      run: |
        zig build -Dtarget=${{ matrix.target }}
        ls -la zig-out/bin/

    - name: Upload Cross Compiled Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: cursed-${{ matrix.target }}
        path: zig-out/bin/

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.12.0

    - name: Build Optimized
      run: |
        zig build -Doptimize=ReleaseFast

    - name: Run Benchmarks
      run: |
        echo 'Performance benchmarks would run here'
        # Add actual benchmark tests here

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: benchmark-results.json
      continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.12.0

    - name: Build CURSED
      run: zig build

    - name: Test VS Code Extension
      run: |
        cd cursed-vscode-extension
        npm install
        npm run compile
        npm test || echo "VS Code extension tests skipped"

    - name: Test Package Manager
      run: |
        echo 'Testing package management...'
        # Add package manager integration tests

    - name: Test Documentation Generation
      run: |
        echo 'Testing documentation generation...'
        # Add documentation generation tests

  publish-artifacts:
    name: Publish Build Artifacts
    runs-on: ubuntu-latest
    needs: [test, cross-compile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v3

    - name: Create Release Assets
      run: |
        mkdir -p release-assets
        for target in x86_64-linux x86_64-windows x86_64-macos aarch64-linux aarch64-macos; do
          if [ -d "cursed-$target" ]; then
            cd "cursed-$target"
            tar -czf "../release-assets/cursed-$target.tar.gz" *
            cd ..
          fi
        done

    - name: Upload to GitHub Packages
      uses: actions/upload-artifact@v3
      with:
        name: release-assets
        path: release-assets/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        cat > Dockerfile << 'EOF'
        FROM alpine:latest
        
        RUN apk add --no-cache \
            zig \
            llvm \
            clang \
            git
        
        WORKDIR /cursed
        COPY . .
        
        RUN zig build
        
        ENV PATH="/cursed/zig-out/bin:${PATH}"
        
        CMD ["cursed-zig", "--help"]
        EOF
        
        docker build -t cursed-lang:latest .

    - name: Push Docker Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag cursed-lang:latest cursed-lang/cursed:latest
        docker push cursed-lang/cursed:latest
