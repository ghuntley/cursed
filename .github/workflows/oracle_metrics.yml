name: Oracle Metrics
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Update metrics daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  oracle_metrics:
    name: 🔮 Update Oracle Metrics
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.1
        
    - name: Install bc (for calculations)
      run: sudo apt-get update && sudo apt-get install -y bc
        
    - name: Run Oracle Metrics
      run: |
        echo "🔮 Oracle Metrics - Evidence-based CURSED project tracking"
        ./scripts/ci/update_metrics.sh
        
    - name: Display Summary
      run: |
        echo "## 📊 Oracle Metrics Summary" >> $GITHUB_STEP_SUMMARY
        cat .github/badges/action_summary.md >> $GITHUB_STEP_SUMMARY
        
    - name: Upload Metrics Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: oracle-metrics
        path: |
          cursed_metrics.json
          fix_plan.md
          .github/badges/
          
    - name: Commit Updated Metrics
      if: github.event_name != 'pull_request'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Oracle Metrics Bot"
        
        if [ -n "$(git status --porcelain)" ]; then
          git add cursed_metrics.json fix_plan.md .github/badges/
          git commit -m "🔮 Oracle: Update evidence-based metrics
          
          - Completion: $(grep 'overall_completion' cursed_metrics.json | cut -d':' -f2 | tr -d ' ,'| cut -c1-5 | xargs echo 'scale=1; * 100' | bc)%
          - Issues: $(grep 'total_issues' cursed_metrics.json | cut -d':' -f2 | tr -d ' ,') remaining
          - Build: $(grep 'build_success' cursed_metrics.json | cut -d':' -f2 | tr -d ' ,' | sed 's/true/✅ Success/;s/false/❌ Failed/')
          
          Auto-generated by Oracle Metrics system"
          git push
        else
          echo "No metrics changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  performance_tracking:
    name: 📈 Performance Tracking
    runs-on: ubuntu-latest
    needs: oracle_metrics
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download Metrics
      uses: actions/download-artifact@v4
      with:
        name: oracle-metrics
        
    - name: Track Progress Over Time
      run: |
        # Store historical metrics (if we had a database)
        echo "📈 Historical tracking would store:"
        echo "   Date: $(date)"
        echo "   Completion: $(grep 'overall_completion' cursed_metrics.json | cut -d':' -f2)"
        echo "   Issues: $(grep 'total_issues' cursed_metrics.json | cut -d':' -f2)"
        echo "   Build: $(grep 'build_success' cursed_metrics.json | cut -d':' -f2)"
        
    - name: Generate Trend Report
      run: |
        echo "## 📊 Trend Analysis" >> $GITHUB_STEP_SUMMARY
        echo "- **Current Run**: Progress tracked" >> $GITHUB_STEP_SUMMARY
        echo "- **Metrics**: Evidence-based analysis complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Next**: Compare with historical data" >> $GITHUB_STEP_SUMMARY
