name: Documentation Generation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'specs/**'
      - 'docs/**'
      - '.cursed-doc.toml'
      - 'Cargo.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'specs/**'
      - 'docs/**'
      - '.cursed-doc.toml'
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  check-docs:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup development environment
        run: |
          nix develop --command echo "Development environment ready"

      - name: Check documentation completeness
        run: |
          nix develop --command make docs-check

      - name: Generate documentation
        run: |
          nix develop --command make docs

      - name: Generate Markdown documentation
        run: |
          nix develop --command make docs-markdown

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: cursed-documentation-${{ github.sha }}
          path: |
            docs/html/
            docs/markdown/
          retention-days: 30

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: check-docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate documentation for deployment
        run: |
          nix develop --command make docs
          # Configure for GitHub Pages deployment
          echo "cursed.dev" > docs/html/CNAME
          touch docs/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/html
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy documentation for ${{ github.sha }}'

  validate-config:
    name: Validate Documentation Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate documentation configuration
        run: |
          nix develop --command cargo build --bin cursed-doc
          # Test configuration loading
          nix develop --command ./target/debug/cursed-doc --config .cursed-doc.toml --dry-run
          # Generate default config and compare
          nix develop --command ./target/debug/cursed-doc --generate-config .cursed-doc.toml.test
          echo "Configuration validation complete"
