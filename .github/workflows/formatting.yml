name: Code Formatting

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.csd'
      - 'src/**/*.rs'
      - '.cursed_fmt.toml'
      - '.github/workflows/formatting.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.csd'
      - 'src/**/*.rs'
      - '.cursed_fmt.toml'
      - '.github/workflows/formatting.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-formatting:
    name: Rust Code Formatting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
        
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-fmt-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-fmt-
          ${{ runner.os }}-cargo-
    
    - name: Check Rust code formatting
      run: cargo fmt -- --check
      
    - name: Generate Rust formatting diff (on failure)
      if: failure()
      run: |
        echo "## Rust Formatting Issues" > rust-fmt-diff.md
        echo "The following files have formatting issues:" >> rust-fmt-diff.md
        echo '```diff' >> rust-fmt-diff.md
        cargo fmt -- --check --verbose 2>&1 | head -50 >> rust-fmt-diff.md || true
        echo '```' >> rust-fmt-diff.md
        cat rust-fmt-diff.md
        
    - name: Upload Rust formatting diff
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: rust-formatting-diff
        path: rust-fmt-diff.md

  cursed-formatting:
    name: CURSED Code Formatting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential llvm-dev libclang-dev
        
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-fmt-cursed-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-fmt-cursed-
          ${{ runner.os }}-cargo-
    
    - name: Build CURSED formatter
      run: cargo build --bin cursed-fmt
      
    - name: Check CURSED files exist
      run: |
        CURSED_FILES=$(find . -name '*.csd' -not -path './target/*' -not -path './.git/*' | head -10)
        if [ -z "$CURSED_FILES" ]; then
          echo "No CURSED files found - skipping formatting check"
          echo "skip_formatting=true" >> $GITHUB_ENV
        else
          echo "Found CURSED files:"
          echo "$CURSED_FILES"
          echo "skip_formatting=false" >> $GITHUB_ENV
        fi
      
    - name: Check CURSED code formatting
      if: env.skip_formatting == 'false'
      run: |
        find . -name '*.csd' -not -path './target/*' -not -path './.git/*' | xargs ./target/debug/cursed-fmt --check
      
    - name: Generate CURSED formatting diff (on failure)
      if: failure() && env.skip_formatting == 'false'
      run: |
        echo "## CURSED Formatting Issues" > cursed-fmt-diff.md
        echo "The following .csd files have formatting issues:" >> cursed-fmt-diff.md
        echo '```' >> cursed-fmt-diff.md
        find . -name '*.csd' -not -path './target/*' -not -path './.git/*' | while read file; do
          echo "=== $file ===" >> cursed-fmt-diff.md
          ./target/debug/cursed-fmt --diff "$file" >> cursed-fmt-diff.md 2>&1 || true
        done
        echo '```' >> cursed-fmt-diff.md
        cat cursed-fmt-diff.md
        
    - name: Upload CURSED formatting diff
      if: failure() && env.skip_formatting == 'false'
      uses: actions/upload-artifact@v3
      with:
        name: cursed-formatting-diff
        path: cursed-fmt-diff.md

  formatting-summary:
    name: Formatting Summary
    runs-on: ubuntu-latest
    needs: [rust-formatting, cursed-formatting]
    if: always()
    
    steps:
    - name: Generate formatting summary
      run: |
        echo "# Formatting Check Summary" > formatting-summary.md
        echo "" >> formatting-summary.md
        
        if [[ "${{ needs.rust-formatting.result }}" == "success" ]]; then
          echo "✅ **Rust Formatting**: All files properly formatted" >> formatting-summary.md
        else
          echo "❌ **Rust Formatting**: Issues found" >> formatting-summary.md
        fi
        
        if [[ "${{ needs.cursed-formatting.result }}" == "success" ]]; then
          echo "✅ **CURSED Formatting**: All files properly formatted" >> formatting-summary.md
        elif [[ "${{ needs.cursed-formatting.result }}" == "skipped" ]]; then
          echo "⏭️ **CURSED Formatting**: No .csd files found" >> formatting-summary.md
        else
          echo "❌ **CURSED Formatting**: Issues found" >> formatting-summary.md
        fi
        
        echo "" >> formatting-summary.md
        echo "## Next Steps" >> formatting-summary.md
        echo "- Run \`make fmt-fix\` to fix Rust formatting" >> formatting-summary.md
        echo "- Run \`make fmt\` to fix CURSED formatting" >> formatting-summary.md
        echo "- Use \`make fmt-diff\` to preview changes before applying" >> formatting-summary.md
        
        cat formatting-summary.md
        
    - name: Upload formatting summary
      uses: actions/upload-artifact@v3
      with:
        name: formatting-summary
        path: formatting-summary.md
