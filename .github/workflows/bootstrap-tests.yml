name: Bootstrap Compiler Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/bootstrap/**'
      - 'scripts/run_bootstrap_tests.sh'
      - '.github/workflows/bootstrap-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/bootstrap/**'
      - 'scripts/run_bootstrap_tests.sh'
      - '.github/workflows/bootstrap-tests.yml'
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode to run'
        required: true
        default: 'comprehensive'
        type: choice
        options:
          - comprehensive
          - quick
          - minimal_subset
          - stage2_compiler
          - self_compilation
          - performance
          - regression
          - ci_integration
          - memory_usage

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: info

jobs:
  bootstrap-test-matrix:
    name: Bootstrap Tests (${{ matrix.os }}, ${{ matrix.mode }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        mode: [quick, comprehensive]
        exclude:
          # Run comprehensive tests only on Ubuntu for resource efficiency
          - os: macos-latest
            mode: comprehensive
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-bootstrap-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-bootstrap-
          ${{ runner.os }}-cargo-
    
    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential llvm-dev libclang-dev
        
    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install llvm
        echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH
        export LDFLAGS="-L/opt/homebrew/opt/llvm/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/llvm/include"
    
    - name: Build project
      run: |
        cargo build --release
        
    - name: Run bootstrap tests
      run: |
        export TEST_MODE="${{ matrix.mode }}"
        if [[ "${{ github.event.inputs.test_mode }}" != "" ]]; then
          export TEST_MODE="${{ github.event.inputs.test_mode }}"
        fi
        
        case "$TEST_MODE" in
          quick)
            ./scripts/run_bootstrap_tests.sh --quick --verbose
            ;;
          comprehensive)
            ./scripts/run_bootstrap_tests.sh --verbose
            ;;
          *)
            ./scripts/run_bootstrap_tests.sh --category "$TEST_MODE" --verbose
            ;;
        esac
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: bootstrap-test-results-${{ matrix.os }}-${{ matrix.mode }}
        path: test_results/bootstrap/
        retention-days: 30
        
    - name: Upload test logs
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: bootstrap-test-logs-${{ matrix.os }}-${{ matrix.mode }}
        path: test_results/bootstrap/logs/
        retention-days: 7

  bootstrap-memory-tests:
    name: Memory Usage Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-memory-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install system dependencies and monitoring tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential llvm-dev libclang-dev valgrind
        
    - name: Build project with debug info
      run: |
        cargo build --release
        
    - name: Run memory usage tests
      run: |
        ./scripts/run_bootstrap_tests.sh --category memory_usage --verbose
        
    - name: Check for memory leaks
      run: |
        # Run a subset of tests under valgrind
        export VALGRIND_OPTS="--tool=memcheck --leak-check=full --show-leak-kinds=all"
        echo "Running memory leak detection on critical tests"
        # This would run specific tests under valgrind
        
    - name: Upload memory test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: memory-test-results
        path: test_results/bootstrap/
        retention-days: 30

  bootstrap-performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-perf-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential llvm-dev libclang-dev time
        
    - name: Build optimized release
      run: |
        cargo build --release
        
    - name: Run performance benchmarks
      run: |
        ./scripts/run_bootstrap_tests.sh --category performance --verbose
        
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-test-results
        path: test_results/bootstrap/
        retention-days: 30

  bootstrap-regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-regression-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential llvm-dev libclang-dev
        
    - name: Build project
      run: |
        cargo build --release
        
    - name: Run regression tests
      run: |
        ./scripts/run_bootstrap_tests.sh --category regression --verbose
        
    - name: Upload regression results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: regression-test-results
        path: test_results/bootstrap/
        retention-days: 30

  bootstrap-self-compilation:
    name: Self-Compilation Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-self-comp-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential llvm-dev libclang-dev
        
    - name: Build project
      run: |
        cargo build --release
        
    - name: Run self-compilation tests
      run: |
        ./scripts/run_bootstrap_tests.sh --category self_compilation --verbose
        
    - name: Upload self-compilation results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: self-compilation-test-results
        path: test_results/bootstrap/
        retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [bootstrap-test-matrix, bootstrap-regression-tests]
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v3
      with:
        path: all-test-results/
        
    - name: Generate test summary
      run: |
        echo "# Bootstrap Test Summary" > test-summary.md
        echo "" >> test-summary.md
        echo "## Test Results by Job" >> test-summary.md
        echo "" >> test-summary.md
        
        # Count successful and failed jobs
        TOTAL_JOBS=0
        SUCCESSFUL_JOBS=0
        
        for result_dir in all-test-results/*/; do
          if [[ -d "$result_dir" ]]; then
            TOTAL_JOBS=$((TOTAL_JOBS + 1))
            
            # Check if the job was successful based on artifacts
            if [[ -f "$result_dir/reports/bootstrap_test_report.md" ]]; then
              SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
              echo "✅ $(basename "$result_dir")" >> test-summary.md
            else
              echo "❌ $(basename "$result_dir")" >> test-summary.md
            fi
          fi
        done
        
        echo "" >> test-summary.md
        echo "## Summary" >> test-summary.md
        echo "- **Total Jobs:** $TOTAL_JOBS" >> test-summary.md
        echo "- **Successful:** $SUCCESSFUL_JOBS" >> test-summary.md
        echo "- **Failed:** $((TOTAL_JOBS - SUCCESSFUL_JOBS))" >> test-summary.md
        echo "- **Success Rate:** $(( SUCCESSFUL_JOBS * 100 / TOTAL_JOBS ))%" >> test-summary.md
        
        cat test-summary.md
        
    - name: Upload test summary
      uses: actions/upload-artifact@v3
      with:
        name: test-summary
        path: test-summary.md
        retention-days: 30
