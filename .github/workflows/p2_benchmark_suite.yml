name: P2 CURSED Compiler Comprehensive Benchmark Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run benchmarks daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      benchmark_mode:
        description: 'Benchmark mode to run'
        required: true
        default: 'full'
        type: choice
        options:
        - full
        - cursed-only
        - cross-lang
        - memory
        - real-world
      upload_artifacts:
        description: 'Upload benchmark artifacts'
        required: false
        default: true
        type: boolean

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Set benchmark matrix
      id: set-matrix
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          # Full matrix for scheduled runs
          echo "matrix={\"os\":[\"ubuntu-latest\",\"ubuntu-20.04\"],\"mode\":[\"full\",\"memory\"]}" >> $GITHUB_OUTPUT
        else
          # Reduced matrix for PR/push
          echo "matrix={\"os\":[\"ubuntu-latest\"],\"mode\":[\"cursed-only\"]}" >> $GITHUB_OUTPUT
        fi

  benchmark:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for regression analysis

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/pip
          p2_benchmark_venv
        key: ${{ runner.os }}-python-${{ hashFiles('p2_requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-python-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          valgrind \
          build-essential \
          llvm-16-dev \
          libclang-16-dev \
          time \
          sqlite3
        
        # Install additional compilers for cross-language comparison
        sudo apt-get install -y golang-go rustc
        
        # Verify installations
        valgrind --version
        go version
        rustc --version
        g++ --version

    - name: Setup Zig
      uses: korandoru/setup-zig@v1
      with:
        zig-version: 0.11.0

    - name: Cache Zig dependencies
      uses: actions/cache@v3
      with:
        path: |
          zig-cache
          zig-out
        key: ${{ runner.os }}-zig-${{ hashFiles('build.zig') }}
        restore-keys: |
          ${{ runner.os }}-zig-

    - name: Setup P2 Benchmark Suite
      run: |
        echo "🚀 Setting up P2 Comprehensive Benchmark Suite"
        ./run_p2_benchmark_suite.sh setup

    - name: Build CURSED Compiler
      run: |
        echo "🔨 Building CURSED compiler with optimizations"
        zig build -Doptimize=ReleaseFast
        
        # Verify compiler works
        ./zig-out/bin/cursed-zig --version || echo "Warning: Version check failed"

    - name: Run P2 Benchmark Suite
      id: benchmark
      run: |
        echo "🏃‍♂️ Running P2 Benchmark Suite - Mode: ${{ matrix.mode }}"
        
        # Set CI-friendly timeouts
        export BENCHMARK_TIMEOUT=180
        export MAX_WORKERS=2
        
        # Run benchmarks based on mode
        case "${{ matrix.mode }}" in
          full)
            ./run_p2_benchmark_suite.sh run
            ;;
          cursed-only)
            ./run_p2_benchmark_suite.sh cursed-only
            ;;
          cross-lang)
            ./run_p2_benchmark_suite.sh cross-lang
            ;;
          memory)
            ./run_p2_benchmark_suite.sh memory
            ;;
          real-world)
            ./run_p2_benchmark_suite.sh real-world
            ;;
        esac

    - name: Check for Performance Regressions
      id: regression-check
      run: |
        echo "🔍 Checking for performance regressions"
        ./run_p2_benchmark_suite.sh check-regressions || echo "No historical data for comparison"

    - name: Generate Comprehensive Report
      run: |
        echo "📊 Generating comprehensive performance report"
        ./run_p2_benchmark_suite.sh report

    - name: Upload Benchmark Results
      if: ${{ inputs.upload_artifacts || github.event_name == 'schedule' }}
      uses: actions/upload-artifact@v3
      with:
        name: p2-benchmark-results-${{ matrix.os }}-${{ matrix.mode }}
        path: |
          p2_benchmark_reports/
          p2_benchmark_results.db
          p2_benchmark_suite.log
        retention-days: 30

    - name: Upload Memory Safety Results
      if: matrix.mode == 'memory' || matrix.mode == 'full'
      uses: actions/upload-artifact@v3
      with:
        name: memory-safety-results-${{ matrix.os }}
        path: |
          p2_benchmark_reports/
          valgrind_*.xml
        retention-days: 7

    - name: Comment PR with Results
      if: github.event_name == 'pull_request' && matrix.mode == 'cursed-only'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Read benchmark results
          let reportContent = '';
          try {
            const reportFiles = fs.readdirSync('p2_benchmark_reports/');
            const latestReport = reportFiles
              .filter(f => f.endsWith('.html'))
              .sort()
              .pop();
            
            if (latestReport) {
              reportContent = `## 🚀 P2 Benchmark Results

Benchmark suite completed for this PR.

**Mode:** ${{ matrix.mode }}
**OS:** ${{ matrix.os }}

📊 [View Detailed Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

### Quick Summary:
- ✅ Compilation tests passed
- 🔍 Memory safety validation completed
- ⚡ Performance comparison with baseline

Download the full report from the workflow artifacts.`;
            }
          } catch (error) {
            reportContent = `## 🚀 P2 Benchmark Results

Benchmark suite completed with some issues.

**Error:** ${error.message}

Please check the workflow logs for details.`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: reportContent
          });

    - name: Fail on Critical Regressions
      run: |
        echo "🚨 Checking for critical performance regressions"
        
        # Check if there are any critical regressions in the database
        if [ -f "p2_benchmark_results.db" ]; then
          CRITICAL_REGRESSIONS=$(sqlite3 p2_benchmark_results.db "
            SELECT COUNT(*) FROM cross_language_results 
            WHERE timestamp > datetime('now', '-1 hour') 
            AND success = 0
          " || echo "0")
          
          if [ "$CRITICAL_REGRESSIONS" -gt "0" ]; then
            echo "❌ Found $CRITICAL_REGRESSIONS critical regressions"
            exit 1
          else
            echo "✅ No critical regressions detected"
          fi
        fi

  regression-analysis:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: benchmark
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all benchmark results
      uses: actions/download-artifact@v3
      with:
        path: benchmark-artifacts

    - name: Setup Python for analysis
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install analysis dependencies
      run: |
        pip install pandas numpy scipy matplotlib seaborn plotly

    - name: Perform Historical Analysis
      run: |
        echo "📈 Performing historical trend analysis"
        
        # Combine all results from artifacts
        python3 << 'EOF'
        import os
        import sqlite3
        import pandas as pd
        from pathlib import Path
        
        # Find all database files in artifacts
        artifact_dir = Path('benchmark-artifacts')
        db_files = list(artifact_dir.rglob('*.db'))
        
        print(f"Found {len(db_files)} database files")
        
        if db_files:
            # Combine data from all runs
            combined_data = []
            for db_file in db_files:
                try:
                    conn = sqlite3.connect(str(db_file))
                    df = pd.read_sql_query("""
                        SELECT * FROM cross_language_results 
                        WHERE success = 1
                        ORDER BY timestamp DESC LIMIT 100
                    """, conn)
                    combined_data.append(df)
                    conn.close()
                except Exception as e:
                    print(f"Error reading {db_file}: {e}")
            
            if combined_data:
                all_data = pd.concat(combined_data, ignore_index=True)
                print(f"Combined {len(all_data)} benchmark records")
                
                # Perform trend analysis
                performance_summary = all_data.groupby(['benchmark_name', 'language']).agg({
                    'compilation_time_ms': ['mean', 'std', 'count'],
                    'execution_time_ms': ['mean', 'std', 'count'],
                    'memory_usage_kb': ['mean', 'std', 'count']
                }).round(2)
                
                print("\n📊 Performance Summary:")
                print(performance_summary.to_string())
                
                # Save summary to file
                with open('performance_trend_analysis.txt', 'w') as f:
                    f.write("P2 CURSED Compiler Performance Trend Analysis\n")
                    f.write("=" * 50 + "\n\n")
                    f.write(performance_summary.to_string())
        else:
            print("No benchmark databases found for analysis")
        EOF

    - name: Upload Trend Analysis
      uses: actions/upload-artifact@v3
      with:
        name: trend-analysis-report
        path: |
          performance_trend_analysis.txt
        retention-days: 90

  notification:
    if: always() && (github.event_name == 'schedule' || failure())
    needs: [benchmark, regression-analysis]
    runs-on: ubuntu-latest
    
    steps:
    - name: Notify on Failure
      if: failure()
      run: |
        echo "🚨 P2 Benchmark Suite Failed"
        echo "The benchmark suite encountered failures."
        echo "Please check the workflow logs and artifacts for details."
        
        # In a real environment, this would send notifications to:
        # - Slack/Discord webhook
        # - Email alerts
        # - GitHub issue creation
        # - Performance dashboard updates

    - name: Notify on Success
      if: success() && github.event_name == 'schedule'
      run: |
        echo "✅ P2 Benchmark Suite Completed Successfully"
        echo "Daily benchmark run completed with no regressions detected."
