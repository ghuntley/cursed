name: Build and Release CURSED Compiler

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build CURSED Compiler
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: cursed-compiler-linux-x64
            binary: cursed-compiler
          - os: windows-latest
            target: x86_64-windows
            artifact: cursed-compiler-windows-x64
            binary: cursed-compiler.exe
          - os: macos-latest
            target: x86_64-macos
            artifact: cursed-compiler-macos-x64
            binary: cursed-compiler
          - os: macos-latest
            target: aarch64-macos
            artifact: cursed-compiler-macos-arm64
            binary: cursed-compiler

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-${{ matrix.target }}-${{ hashFiles('build.zig', 'src-zig/**') }}
          restore-keys: |
            zig-${{ matrix.target }}-

      - name: Build CURSED compiler
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Create artifact directory
        run: |
          mkdir -p artifacts
          cp zig-out/bin/${{ matrix.binary }} artifacts/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.binary }}
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List downloaded artifacts
        run: find release-artifacts -type f -name "*" -exec ls -la {} \;

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Linux x64
          cp release-artifacts/cursed-compiler-linux-x64/cursed-compiler release-assets/cursed-compiler-linux-x64
          chmod +x release-assets/cursed-compiler-linux-x64
          
          # Windows x64
          cp release-artifacts/cursed-compiler-windows-x64/cursed-compiler.exe release-assets/cursed-compiler-windows-x64.exe
          
          # macOS x64
          cp release-artifacts/cursed-compiler-macos-x64/cursed-compiler release-assets/cursed-compiler-macos-x64
          chmod +x release-assets/cursed-compiler-macos-x64
          
          # macOS ARM64
          cp release-artifacts/cursed-compiler-macos-arm64/cursed-compiler release-assets/cursed-compiler-macos-arm64
          chmod +x release-assets/cursed-compiler-macos-arm64

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/cursed-compiler-linux-x64
            release-assets/cursed-compiler-windows-x64.exe
            release-assets/cursed-compiler-macos-x64
            release-assets/cursed-compiler-macos-arm64
            release-assets/checksums.sha256
          tag_name: ${{ github.ref_name }}
          name: CURSED Compiler ${{ github.ref_name }}
          body: |
            ## CURSED Programming Language Compiler Release
            
            This release contains pre-compiled binaries of the CURSED compiler for multiple platforms.
            
            ### Downloads
            - **Linux x64**: `cursed-compiler-linux-x64`
            - **Windows x64**: `cursed-compiler-windows-x64.exe`  
            - **macOS x64**: `cursed-compiler-macos-x64`
            - **macOS ARM64**: `cursed-compiler-macos-arm64`
            
            ### Usage
            ```bash
            # Make executable (Linux/macOS)
            chmod +x cursed-compiler-*
            
            # Compile a CURSED program
            ./cursed-compiler-* --compile program.💀 -o output
            
            # Run in interpreter mode
            ./cursed-compiler-* --interpret program.💀
            ```
            
            ### Verification
            Use the provided `checksums.sha256` file to verify download integrity:
            ```bash
            sha256sum -c checksums.sha256
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
