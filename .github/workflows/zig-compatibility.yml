name: Zig API Compatibility

on:
  schedule:
    # Run nightly at 2 AM UTC to catch Zig master changes
    - cron: '0 2 * * *'
  push:
    paths:
      - 'src-zig/**'
      - 'build.zig'
      - '.github/workflows/zig-compatibility.yml'
  pull_request:
    paths:
      - 'src-zig/**' 
      - 'build.zig'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Test against multiple Zig versions
  zig-matrix-test:
    name: Test Zig ${{ matrix.zig-version }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        zig-version: 
          - "0.15.1"    # Minimum supported
          - "0.15.2"    # Patch release
          - "0.16.0"    # Next minor
        experimental: [false]
        include:
          # Test against Zig master (experimental)
          - os: ubuntu-latest
            zig-version: "master"
            experimental: true
          # Test against release candidates
          - os: ubuntu-latest
            zig-version: "0.16.0-rc"
            experimental: true
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: ${{ matrix.zig-version }}

    - name: Cache Zig Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/zig
          zig-cache
        key: ${{ runner.os }}-zig-${{ matrix.zig-version }}-${{ hashFiles('build.zig') }}
        restore-keys: |
          ${{ runner.os }}-zig-${{ matrix.zig-version }}-
          ${{ runner.os }}-zig-

    - name: Check Zig Version Compatibility
      run: |
        zig version
        echo "Testing compatibility with Zig ${{ matrix.zig-version }}"

    - name: Test Version Abstraction Layer
      run: |
        zig test src-zig/zig_version.zig

    - name: Build with Compatibility Layer
      id: build
      run: |
        echo "Building CURSED with Zig ${{ matrix.zig-version }}"
        zig build 2>&1 | tee build_output.log
        echo "build_status=$?" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Analyze Build Output
      run: |
        echo "=== Build Analysis for Zig ${{ matrix.zig-version }} ==="
        if [ -f build_output.log ]; then
          echo "Build output:"
          cat build_output.log
          
          # Check for API deprecation warnings
          if grep -i "deprecated" build_output.log; then
            echo "⚠️  DEPRECATED API USAGE DETECTED"
            echo "deprecated_apis=true" >> $GITHUB_ENV
          fi
          
          # Check for compilation errors
          if grep -i "error:" build_output.log; then
            echo "❌ COMPILATION ERRORS DETECTED"
            echo "compilation_errors=true" >> $GITHUB_ENV
          fi
          
          # Check for warnings
          if grep -i "warning:" build_output.log; then
            echo "⚠️  COMPILATION WARNINGS DETECTED"
            echo "compilation_warnings=true" >> $GITHUB_ENV
          fi
        fi

    - name: Test Basic Functionality
      if: steps.build.outputs.build_status == '0'
      run: |
        if [ -f zig-out/bin/cursed-zig ]; then
          echo "Testing basic functionality..."
          echo 'vibez.spill("Hello from Zig ${{ matrix.zig-version }}")' > compat_test.csd
          ./zig-out/bin/cursed-zig compat_test.csd || echo "Runtime test failed"
        else
          echo "No binary produced - build may have failed"
          exit 1
        fi

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-zig-${{ matrix.zig-version }}
        path: |
          build_output.log
          zig-out/bin/
        retention-days: 7

    - name: Report API Compatibility Status
      if: always()
      run: |
        echo "=== API Compatibility Report for Zig ${{ matrix.zig-version }} ==="
        if [ "${{ env.deprecated_apis }}" = "true" ]; then
          echo "🔶 DEPRECATED APIS: Update required"
          echo "compatibility_status=deprecated" >> $GITHUB_ENV
        elif [ "${{ env.compilation_errors }}" = "true" ]; then
          echo "❌ INCOMPATIBLE: Breaking changes detected"
          echo "compatibility_status=broken" >> $GITHUB_ENV
        elif [ "${{ env.compilation_warnings }}" = "true" ]; then
          echo "⚠️  WARNINGS: Minor issues detected"
          echo "compatibility_status=warnings" >> $GITHUB_ENV
        elif [ "${{ steps.build.outputs.build_status }}" = "0" ]; then
          echo "✅ COMPATIBLE: No issues detected"
          echo "compatibility_status=compatible" >> $GITHUB_ENV
        else
          echo "❌ BUILD FAILED: Unknown compatibility issues"
          echo "compatibility_status=failed" >> $GITHUB_ENV
        fi

  # API change detection job
  api-change-detection:
    name: API Change Detection
    runs-on: ubuntu-latest
    needs: zig-matrix-test
    if: always()
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Zig Master
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: master

    - name: Download All Build Artifacts
      uses: actions/download-artifact@v4

    - name: Analyze API Changes
      run: |
        echo "=== Analyzing API Changes Across Zig Versions ==="
        
        # Create API change detection script
        cat > api_change_detector.py << 'EOF'
        import os
        import re
        import json
        from pathlib import Path
        
        def analyze_build_logs():
            results = {}
            
            for log_dir in Path('.').glob('build-logs-zig-*'):
                version = log_dir.name.replace('build-logs-zig-', '')
                log_file = log_dir / 'build_output.log'
                
                if log_file.exists():
                    content = log_file.read_text()
                    
                    # Extract errors and warnings
                    errors = re.findall(r'error: (.+)', content)
                    warnings = re.findall(r'warning: (.+)', content)
                    deprecated = re.findall(r'deprecated: (.+)', content)
                    
                    results[version] = {
                        'errors': errors,
                        'warnings': warnings,
                        'deprecated': deprecated,
                        'build_success': 'error:' not in content.lower()
                    }
            
            return results
        
        def generate_compatibility_matrix(results):
            print("| Zig Version | Build Status | Errors | Warnings | Deprecated |")
            print("|-------------|--------------|---------|----------|------------|")
            
            for version, data in sorted(results.items()):
                status = "✅" if data['build_success'] else "❌"
                errors = len(data['errors'])
                warnings = len(data['warnings'])
                deprecated = len(data['deprecated'])
                
                print(f"| {version} | {status} | {errors} | {warnings} | {deprecated} |")
        
        def detect_breaking_changes(results):
            breaking_changes = []
            
            for version, data in results.items():
                if not data['build_success']:
                    for error in data['errors']:
                        if any(keyword in error.lower() for keyword in ['undefined symbol', 'no member', 'type mismatch']):
                            breaking_changes.append(f"{version}: {error}")
            
            return breaking_changes
        
        # Run analysis
        results = analyze_build_logs()
        generate_compatibility_matrix(results)
        
        breaking_changes = detect_breaking_changes(results)
        if breaking_changes:
            print("\n🚨 BREAKING CHANGES DETECTED:")
            for change in breaking_changes:
                print(f"  - {change}")
        
        # Save results
        with open('compatibility_report.json', 'w') as f:
            json.dump(results, f, indent=2)
        EOF
        
        python3 api_change_detector.py

    - name: Create API Compatibility Issue
      if: github.event_name == 'schedule'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          
          try {
            const report = JSON.parse(fs.readFileSync('compatibility_report.json', 'utf8'));
            
            let hasIssues = false;
            let issueBody = "## 🔄 Automated Zig API Compatibility Report\n\n";
            issueBody += "This issue was automatically created by the nightly compatibility check.\n\n";
            
            // Check for compatibility issues
            for (const [version, data] of Object.entries(report)) {
              if (!data.build_success || data.errors.length > 0) {
                hasIssues = true;
                issueBody += `### ❌ Zig ${version}\n`;
                issueBody += `- Build Status: ${data.build_success ? '✅' : '❌'}\n`;
                issueBody += `- Errors: ${data.errors.length}\n`;
                issueBody += `- Warnings: ${data.warnings.length}\n`;
                
                if (data.errors.length > 0) {
                  issueBody += "\n**Errors:**\n";
                  data.errors.forEach(error => {
                    issueBody += `- \`${error}\`\n`;
                  });
                }
                issueBody += "\n";
              }
            }
            
            if (hasIssues) {
              issueBody += "\n### 🔧 Recommended Actions\n";
              issueBody += "1. Update `src-zig/zig_version.zig` compatibility layer\n";
              issueBody += "2. Add version-specific workarounds\n";
              issueBody += "3. Update minimum supported version if needed\n";
              issueBody += "4. Test with fixed version before merging\n";
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔄 Zig API Compatibility Issues Detected - ${new Date().toISOString().split('T')[0]}`,
                body: issueBody,
                labels: ['bug', 'zig-compatibility', 'automated']
              });
              
              console.log('Created compatibility issue');
            } else {
              console.log('No compatibility issues detected');
            }
          } catch (error) {
            console.log('Could not parse compatibility report:', error.message);
          }

    - name: Upload Compatibility Report
      uses: actions/upload-artifact@v4
      with:
        name: api-compatibility-report
        path: compatibility_report.json
        retention-days: 30

  # Notification job for failed builds
  notify-on-failure:
    name: Notify on Compatibility Failure
    runs-on: ubuntu-latest
    needs: [zig-matrix-test, api-change-detection]
    if: failure() && github.event_name == 'schedule'
    
    steps:
    - name: Send Discord Notification
      if: env.DISCORD_WEBHOOK_URL
      run: |
        curl -H "Content-Type: application/json" \
             -d '{"content": "🚨 **CURSED Zig Compatibility Alert**\nNightly compatibility check failed. API breaking changes detected in latest Zig versions.\n\nCheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
             ${{ secrets.DISCORD_WEBHOOK_URL }}
      continue-on-error: true

    - name: Create High Priority Issue
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 URGENT: Zig API Compatibility Failure',
            body: `## 🚨 Critical Compatibility Issue
            
            The nightly Zig compatibility check has failed. This indicates potential breaking changes in newer Zig versions.
            
            **Action Required:**
            1. Review the [failed workflow](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. Update the compatibility layer in \`src-zig/zig_version.zig\`
            3. Test fixes against affected Zig versions
            4. Update CI matrix if needed
            
            **Severity:** High Priority
            **Impact:** May affect future releases
            `,
            labels: ['bug', 'high-priority', 'zig-compatibility', 'automated']
          });

  # Update compatibility documentation
  update-docs:
    name: Update Compatibility Documentation
    runs-on: ubuntu-latest
    needs: zig-matrix-test
    if: success() && github.event_name == 'schedule'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download Compatibility Report
      uses: actions/download-artifact@v4
      with:
        name: api-compatibility-report

    - name: Update Compatibility Matrix
      run: |
        echo "Updating compatibility documentation..."
        
        cat > update_docs.py << 'EOF'
        import json
        from datetime import datetime
        
        # Load compatibility report
        with open('compatibility_report.json', 'r') as f:
            report = json.load(f)
        
        # Generate updated compatibility section
        compat_md = f"""## Zig Version Compatibility
        
        Last updated: {datetime.now().strftime('%Y-%m-%d')}
        
        | Zig Version | Status | Errors | Warnings | Notes |
        |-------------|--------|---------|----------|-------|
        """
        
        for version, data in sorted(report.items()):
            status = "✅ Compatible" if data['build_success'] else "❌ Broken"
            if data['deprecated']:
                status = "⚠️ Deprecated APIs"
            elif data['warnings'] and data['build_success']:
                status = "⚠️ Warnings"
                
            errors = len(data['errors'])
            warnings = len(data['warnings'])
            notes = f"{len(data['deprecated'])} deprecated APIs" if data['deprecated'] else "-"
            
            compat_md += f"| {version} | {status} | {errors} | {warnings} | {notes} |\n"
        
        # Update AGENT.md with compatibility info
        try:
            with open('AGENT.md', 'r') as f:
                content = f.read()
            
            # Replace compatibility section or add it
            start_marker = "## Zig Version Compatibility"
            end_marker = "## "
            
            if start_marker in content:
                lines = content.split('\n')
                start_idx = next(i for i, line in enumerate(lines) if line.startswith(start_marker))
                end_idx = next((i for i in range(start_idx + 1, len(lines)) if lines[i].startswith(end_marker)), len(lines))
                
                # Replace the section
                new_lines = lines[:start_idx] + compat_md.strip().split('\n') + [''] + lines[end_idx:]
                content = '\n'.join(new_lines)
            else:
                content += f"\n\n{compat_md}"
            
            with open('AGENT.md', 'w') as f:
                f.write(content)
                
            print("Updated AGENT.md with compatibility matrix")
        except Exception as e:
            print(f"Could not update AGENT.md: {e}")
        EOF
        
        python3 update_docs.py

    - name: Commit Documentation Updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if git diff --quiet; then
          echo "No documentation changes to commit"
        else
          git add AGENT.md
          git commit -m "Update Zig compatibility matrix [skip ci]"
          git push
          echo "Updated compatibility documentation"
        fi
