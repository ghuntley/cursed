<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="assets/docs.css">
    <link rel="stylesheet" href="assets/highlight.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="description" content="{{item_name}} documentation">
</head>
<body class="item-page">
    {{navigation}}
    
    <main class="main-content">
        {{breadcrumbs}}
        
        <article class="item-article">
            {{content}}
        </article>
        
        <aside class="item-sidebar">
            <div class="sidebar-section">
                <h3>Quick Actions</h3>
                <button class="action-button" onclick="copyCurrentURL()">Copy Link</button>
                <button class="action-button" onclick="printPage()">Print</button>
            </div>
            
            <div class="sidebar-section">
                <h3>Contents</h3>
                <ul id="toc-list">
                    <!-- Will be populated by JavaScript -->
                </ul>
            </div>
        </aside>
        
        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2024 {{project_name}} Documentation.</p>
            </div>
        </footer>
    </main>
    
    <script src="assets/docs.js"></script>
    <script src="assets/highlight.js"></script>
    <script src="assets/navigation.js"></script>
    <script>
        // Item-specific functionality
        document.addEventListener('DOMContentLoaded', function() {
            generateTableOfContents('item-article', 'toc-list');
        });
        
        function copyCurrentURL() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                showNotification('URL copied to clipboard!');
            });
        }
        
        function printPage() {
            window.print();
        }
    </script>
</body>
</html>
