<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{FILE_PATH}} - CURSED Coverage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📄 {{FILE_PATH}}</h1>
        <div class="file-stats">
            <span class="stat">Coverage: {{COVERAGE_PERCENTAGE}}%</span>
            <span class="stat">Lines: {{COVERED_LINES}} / {{TOTAL_LINES}}</span>
        </div>
        <nav>
            <a href="index.html">← Back to Summary</a>
        </nav>
    </header>
    
    <main>
        <section class="source-code">
            <div class="source-controls">
                <button onclick="toggleUncoveredLines()">Toggle Uncovered Lines</button>
                <button onclick="toggleLineNumbers()">Toggle Line Numbers</button>
                <input type="text" id="line-search" placeholder="Search in file..." />
            </div>
            
            <table class="source-table" id="source-table">
                <thead>
                    <tr>
                        <th>Line</th>
                        <th>Hits</th>
                        <th>Source</th>
                    </tr>
                </thead>
                <tbody>
                    {{SOURCE_LINES}}
                </tbody>
            </table>
        </section>
    </main>
    
    <footer>
        <p>Generated by CURSED Coverage Tool v1.0</p>
    </footer>
    
    <script src="coverage.js"></script>
</body>
</html>
