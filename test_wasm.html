<!DOCTYPE html>
<html>
<head>
    <title>CURSED WebAssembly Test</title>
</head>
<body>
    <h1>CURSED WebAssembly Test</h1>
    <div id="output"></div>
    
    <script>
        // WebAssembly runtime environment
        const wasmMemory = new WebAssembly.Memory({
            initial: 256,
            maximum: 512
        });
        
        // Create output buffer
        const outputElement = document.getElementById('output');
        
        // WebAssembly imports - implement the runtime functions
        const wasmImports = {
            env: {
                memory: wasmMemory,
                
                // String printing (called by cursed_print)
                wasm_print_string: function(ptr) {
                    const memory = new Uint8Array(wasmMemory.buffer);
                    let str = '';
                    let i = ptr;
                    while (memory[i] !== 0) {
                        str += String.fromCharCode(memory[i]);
                        i++;
                    }
                    outputElement.innerHTML += str + '<br>';
                    console.log('CURSED output:', str);
                },
                
                // Integer printing
                cursed_print_int: function(value) {
                    outputElement.innerHTML += value.toString() + '<br>';
                    console.log('CURSED int:', value);
                },
                
                // Float printing
                cursed_print_float: function(value) {
                    outputElement.innerHTML += value.toString() + '<br>';
                    console.log('CURSED float:', value);
                },
                
                // String printing wrapper
                cursed_print: function(ptr) {
                    const memory = new Uint8Array(wasmMemory.buffer);
                    let str = '';
                    let i = ptr;
                    while (memory[i] !== 0) {
                        str += String.fromCharCode(memory[i]);
                        i++;
                    }
                    outputElement.innerHTML += str + '<br>';
                    console.log('CURSED output:', str);
                },
                
                // Memory allocation (simple bump allocator)
                __wasm_malloc: function(size) {
                    // Simple allocator - in real implementation would be more sophisticated
                    if (!wasmImports.env.__heap_ptr) {
                        wasmImports.env.__heap_ptr = 1024; // Start heap at 1KB
                    }
                    const ptr = wasmImports.env.__heap_ptr;
                    wasmImports.env.__heap_ptr += size;
                    return ptr;
                },
                
                // Memory deallocation (no-op for simplicity)
                __wasm_free: function(ptr) {
                    // No-op for simple allocator
                },
                
                // Standard library functions
                printf: function(fmt, ...args) {
                    console.log('printf called:', fmt, args);
                    return 0;
                },
                
                puts: function(ptr) {
                    const memory = new Uint8Array(wasmMemory.buffer);
                    let str = '';
                    let i = ptr;
                    while (memory[i] !== 0) {
                        str += String.fromCharCode(memory[i]);
                        i++;
                    }
                    outputElement.innerHTML += str + '<br>';
                    console.log('puts:', str);
                    return str.length;
                },
                
                malloc: function(size) {
                    return wasmImports.env.__wasm_malloc(size);
                },
                
                free: function(ptr) {
                    wasmImports.env.__wasm_free(ptr);
                }
            }
        };
        
        // Load and instantiate the WebAssembly module
        async function loadWasm() {
            try {
                outputElement.innerHTML += 'Loading CURSED WebAssembly module...<br>';
                
                const wasmModule = await WebAssembly.instantiateStreaming(
                    fetch('test_wasm_simple.wasm'),
                    wasmImports
                );
                
                outputElement.innerHTML += 'WebAssembly module loaded successfully!<br>';
                
                // Call the main function if it exists
                if (wasmModule.instance.exports.main) {
                    outputElement.innerHTML += 'Executing CURSED program...<br>';
                    wasmModule.instance.exports.main();
                } else {
                    outputElement.innerHTML += 'Available exports: ' + Object.keys(wasmModule.instance.exports).join(', ') + '<br>';
                }
                
            } catch (error) {
                outputElement.innerHTML += 'Error loading WebAssembly: ' + error.message + '<br>';
                console.error('WebAssembly error:', error);
            }
        }
        
        // Load the module when the page loads
        loadWasm();
    </script>
</body>
</html>
