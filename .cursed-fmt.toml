# CURSED Formatter Configuration
# Professional code formatting settings for CURSED language

[formatting]
# Indentation settings
indent_size = 4              # Number of spaces per indent level  
use_spaces = true            # Use spaces instead of tabs
max_line_length = 100        # Maximum line length before wrapping

# Spacing settings
space_around_operators = true        # Add spaces around +, -, =, etc.
align_struct_fields = true          # Align struct field declarations
newline_before_brace = false        # Put opening brace on same line
preserve_comments = true            # Keep comment formatting

# CURSED-specific settings
align_gen_z_keywords = true         # Align Gen Z keywords like "sus", "slay"
prefer_short_form_syntax = true     # Prefer concise CURSED syntax where possible

[styles]
# Predefined formatting styles
default = "professional"            # Default style to use
compact = { indent_size = 2, max_line_length = 80 }
google = { indent_size = 2, max_line_length = 120, newline_before_brace = false }
enterprise = { indent_size = 4, max_line_length = 120, align_struct_fields = true }

[validation]
# Syntax validation settings
check_brace_matching = true         # Validate matching braces/brackets/parentheses
warn_on_long_lines = true          # Warn when lines exceed max_line_length
enforce_cursed_keywords = true      # Ensure proper CURSED syntax usage

[output]
# Output formatting settings
show_diff_on_format = false        # Show diff when formatting
backup_on_in_place = false         # Create backup when formatting in place
verbose_output = false             # Enable detailed output messages
