[package]
name = "productivity-core"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Core functionality for the CURSED productivity suite"
keywords = ["productivity", "core", "utilities"]
categories = ["development-tools", "data-structures"]

[dependencies]
# Use workspace-shared dependencies
json_utils.workspace = true
log_manager.workspace = true
error_handling.workspace = true
config_parser.workspace = true

# Package-specific dependencies
date_time = "2.3.0"
crypto_utils = { version = "1.8.0", features = ["hashing"] }

[dev-dependencies]
test_framework.workspace = true
benchmark_suite = "0.7.0"

[lib]
name = "productivity_core"
path = "src/lib.💀"
