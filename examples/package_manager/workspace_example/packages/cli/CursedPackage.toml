[package]
name = "productivity-cli"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Command-line interface for the productivity suite"
keywords = ["cli", "productivity", "command-line"]
categories = ["command-line-utilities"]

[dependencies]
# Workspace member dependency
productivity-core = { path = "../core" }

# Workspace-shared dependencies
json_utils.workspace = true
log_manager.workspace = true
error_handling.workspace = true
config_parser.workspace = true

# CLI-specific dependencies
arg_parser = "3.1.0"
terminal_ui = { version = "2.5.0", features = ["color", "progress"] }
file_utils = "1.4.0"

[dev-dependencies]
test_framework.workspace = true
temp_files = "1.0.0"

[[bin]]
name = "productivity"
path = "src/main.💀"

[[bin]]
name = "prod-config"
path = "src/bin/config.💀"
