# LaTeX Documentation Generator Configuration Example
# This file demonstrates all available configuration options for the LaTeX generator

[project]
name = "CURSED Programming Language"
version = "1.0.0"
description = "A modern programming language with Gen Z syntax"
authors = ["CURSED Development Team"]

[latex]
# Document class: "article", "report", "book", or "beamer"
document_class = "book"

# Custom document options (optional)
document_options = ["11pt", "a4paper", "twoside", "openright"]

# Paper and formatting settings
paper_size = "a4paper"
font_size = "11pt"
margins = "margin=1in"

# Table of contents and lists
generate_toc = true
generate_lof = true  # List of figures
generate_lot = true  # List of tables
toc_depth = 3

# Index and bibliography
generate_index = true
generate_bibliography = true
bibliography_style = "alpha"

# Code and technical features
include_code_listings = true
generate_cross_refs = true
math_support = true
unicode_support = true
custom_headers = true

[latex.syntax_highlighting]
# Use minted (requires Python pygments) or listings
use_minted = false
show_line_numbers = true
line_number_style = "left"
tab_size = 4
break_lines = true

[latex.syntax_highlighting.color_scheme]
background = "backcolour"
comment = "codegreen"
keyword = "magenta"
string = "codepurple"
number = "orange"
function = "blue"
type_name = "violet"

[latex.packages]
# Standard packages (automatically included)
standard_packages = [
    "inputenc",
    "fontenc", 
    "lmodern",
    "geometry",
    "fancyhdr",
    "listings",
    "xcolor",
    "hyperref",
    "graphicx",
    "amsmath",
    "amsfonts",
    "amssymb",
    "booktabs",
    "longtable",
    "makeidx"
]

# Additional packages with options
[latex.packages.additional_packages]
"inputenc" = ["utf8"]
"fontenc" = ["T1"]
"geometry" = ["margin=1in"]
"hyperref" = ["colorlinks=true", "linkcolor=blue"]

# Custom LaTeX definitions
custom_definitions = [
    "\\newcommand{\\cursed}[1]{\\texttt{#1}}",
    "\\newcommand{\\keyword}[1]{\\textcolor{magenta}{\\texttt{#1}}}",
    "\\definecolor{cursedblue}{RGB}{0,102,204}"
]
