# CURSED Build Configuration Example
# This file defines the build configuration for a CURSED project

[project]
name = "my-cursed-app"
version = "1.0.0"
description = "A sample CURSED application demonstrating build system features"
authors = ["CURSED Developer <dev@cursed-lang.org>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/cursed-lang/my-cursed-app"
documentation = "https://docs.cursed-lang.org/my-cursed-app"
keywords = ["cursed", "application", "demo"]
categories = ["development-tools"]
edition = "2024"

# Build targets - executables and libraries
[[targets]]
name = "my-cursed-app"
type = "bin"
path = "src/main.csd"
required_features = []

[[targets]]
name = "helper-tool"
type = "bin"
path = "src/bin/helper.csd"
required_features = ["dev-tools"]

[[targets]]
name = "my-cursed-app-lib"
type = "lib"
path = "src/lib.csd"
required_features = []

# Build profiles for different scenarios
[profiles.dev]
optimization = "none"
debug = true
strip = false
lto = false
panic = "unwind"
codegen_units = 16
llvm_args = []
env = { RUST_LOG = "debug" }

[profiles.release]
optimization = "max"
debug = false
strip = true
lto = true
panic = "abort"
codegen_units = 1
llvm_args = ["-march=native"]
env = {}

[profiles.production]
inherits = "release"
optimization = "size"
debug = false
strip = true
lto = true
panic = "abort"
codegen_units = 1
llvm_args = ["-march=native", "-mtune=native"]
env = { CURSED_PRODUCTION = "true" }

[profiles.debug-optimized]
inherits = "dev"
optimization = "basic"
debug = true
strip = false
lto = false

# Runtime dependencies
[dependencies]
cursed-http = "^1.0.0"
cursed-json = "^2.1.0"
cursed-crypto = { version = "^1.5.0", features = ["sha256", "rsa"] }
cursed-async = "^0.9.0"
cursed-cli = { version = "^1.2.0", optional = true }

# Development dependencies
[dev_dependencies]
cursed-test = "^1.0.0"
cursed-mock = "^0.8.0"
cursed-bench = "^1.1.0"

# Build-time dependencies
[build_dependencies]
cursed-codegen = "^0.5.0"
cursed-build-tools = "^1.0.0"

# Feature flags
[features]
default = ["basic"]
basic = []
dev-tools = ["cursed-cli"]
crypto = ["cursed-crypto/all-algorithms"]
async = ["cursed-async/full"]
full = ["dev-tools", "crypto", "async"]

# Build scripts and hooks
[scripts]
pre-build = "echo 'Starting build process...'"
post-build = "echo 'Build completed successfully!'"
pre-test = "./scripts/setup-test-env.sh"
post-test = "./scripts/cleanup-test-env.sh"
pre-build-my-cursed-app = "echo 'Building main application...'"

# Tool configurations
[tools.formatter]
indent_size = 4
line_width = 100
brace_style = "same-line"
spaces_around_operators = true

[tools.linter]
max_line_length = 120
allow_unused_variables = false
enforce_naming_convention = true
severity_level = "warning"

[tools.docs]
format = "html"
include_private = false
generate_api_docs = true
output_dir = "docs"

[tools.packages]
registry = "https://packages.cursed-lang.org"
cache_dir = ".cursed-cache"
auto_update = false
