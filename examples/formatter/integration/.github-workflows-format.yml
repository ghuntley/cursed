# GitHub Actions workflow for CURSED code formatting
# Save this as .github/workflows/format.yml

name: Code Formatting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format-check:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: rustfmt
        override: true
    
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build CURSED formatter
      run: |
        cargo build --release --bin cursed-fmt
        sudo cp target/release/cursed-fmt /usr/local/bin/
    
    - name: Check CURSED code formatting
      run: |
        # Check if any .💀 files need formatting
        if find . -name "*.💀" -type f | head -1 | grep -q .; then
          echo "Checking CURSED code formatting..."
          cursed-fmt --check --quiet src/ examples/
        else
          echo "No CURSED files found to check"
        fi
    
    - name: Show formatting diff (if check failed)
      if: failure()
      run: |
        echo "The following files need formatting:"
        cursed-fmt --diff src/ examples/ || true
        echo ""
        echo "To fix formatting issues locally, run:"
        echo "  cursed-fmt -w src/ examples/"

  format-fix:
    name: Auto-fix Formatting (Optional)
    runs-on: ubuntu-latest
    # Only run on pushes to non-main branches
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        # Use a token that can push to the repository
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Build CURSED formatter
      run: |
        cargo build --release --bin cursed-fmt
        sudo cp target/release/cursed-fmt /usr/local/bin/
    
    - name: Auto-fix formatting
      run: |
        # Format all CURSED files
        if find . -name "*.💀" -type f | head -1 | grep -q .; then
          cursed-fmt -w src/ examples/
        fi
    
    - name: Commit formatting changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Check if there are any changes
        if ! git diff --quiet; then
          git add .
          git commit -m "Auto-fix CURSED code formatting [skip ci]"
          git push
        else
          echo "No formatting changes needed"
        fi
