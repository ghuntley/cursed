# Example CURSED formatter configuration
# This is a comprehensive example showing all available options

[formatting]
# Maximum line width before wrapping (default: 80)
line_width = 100

# Number of spaces per indentation level (default: 4)  
tab_size = 4

# Use tabs instead of spaces (default: false)
use_tabs = false

# Add trailing commas where valid (default: true)
trailing_commas = true

# Space before colon in struct/map literals (default: false)
space_before_colon = false

# Spaces around binary operators (default: true)  
spaces_around_operators = true

# Break function arguments to multiple lines
# Options: "auto" (default), "always", "never"
function_args_layout = "auto"

# Break struct/map literals to multiple lines  
# Options: "auto" (default), "always", "never"
struct_layout = "auto"

# Align consecutive assignments (default: false)
align_assignments = false

# Sort import statements alphabetically (default: true)
sort_imports = true

# Group imports by type (standard library, third party, local)
group_imports = true

# Align struct field colons vertically (default: false)
align_struct_fields = false

# Break chained method calls (default: "auto")
# Options: "auto", "always", "never"
break_method_chains = "auto"

[comments]
# Preserve original comment formatting (default: true)
preserve_comments = true

# Align inline comments to the same column (default: false)
align_inline_comments = false

# Maximum width for comments before wrapping (default: 80)
comment_width = 80

# Normalize comment spacing (default: true)
normalize_comment_spacing = true

[newlines]
# Blank lines after import statements (default: 1)
blank_lines_after_imports = 1

# Blank lines between function definitions (default: 2)
blank_lines_between_functions = 2

# Blank lines at start/end of code blocks (default: 0)
blank_lines_in_blocks = 0

# Maximum consecutive blank lines to preserve (default: 2)
max_blank_lines = 2

[strings]
# Prefer single quotes when possible (default: false)
prefer_single_quotes = false

# Normalize string escape sequences (default: true)
normalize_escapes = true

# Break long string literals (default: true)
break_long_strings = true

# Use raw strings when beneficial (default: false)
prefer_raw_strings = false
