// Sample Protocol Buffers output generated by the CURSED Template System
// This demonstrates the comprehensive protobuf rendering capabilities

syntax = "proto3";

package com.example.api;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option java_package = "com.example.api";
option go_package = "github.com/example/api";
option csharp_namespace = "Example.Api";

enum Status {
  UNKNOWN = 0;
  ACTIVE = 1;
  INACTIVE = 2;
}

message User {
  string name = 1;
  int32 age = 2 [deprecated = false];
  repeated string tags = 3;
}

service UserService {
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (stream ListUsersResponse);
}
