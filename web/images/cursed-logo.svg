  <path d="M80 40L100 60L80 80" stroke="url(#gradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center element -->
  <path d="M55 35L65 85" stroke="url(#gradient)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Sparkle elements -->
  <circle cx="30" cy="30" r="4" fill="url(#gradient)"/>
