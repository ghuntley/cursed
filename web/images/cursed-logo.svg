      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="100%" stop-color="#6600ff" />
    </linearGradient>
  </defs>
  
  <!-- Main circular background -->
  <circle cx="60" cy="60" r="56" fill="white" stroke="url(#gradient)" stroke-width="4"/>
  
