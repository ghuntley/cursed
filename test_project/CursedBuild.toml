[project]
name = "test_project"
version = "0.1.0"
description = "A CURSED binary project"
authors = ["Your Name <your.email@example.com>"]
license = "MIT OR Apache-2.0"
keywords = []
categories = []
edition = "2024"

[[targets]]
name = "{{project_name}}"
type = "bin"
path = "src/main.csd"
required_features = []

[targets.config]

[profiles.dev]
optimization = "none"
debug = true
strip = false
lto = false
panic = "unwind"
llvm_args = []

[profiles.dev.env]

[profiles.release]
optimization = "max"
debug = false
strip = true
lto = true
panic = "abort"
codegen_units = 1
llvm_args = []

[profiles.release.env]

[dependencies]

[dev_dependencies]

[build_dependencies]

[features]

[scripts]

[tools.formatter]
indent_style = ""
indent_size = 0
line_width = 0
brace_style = ""
format_on_build = false

[tools.formatter.options]

[tools.linter]
lint_on_build = false
auto_fix = false
severity = ""
disabled_rules = []
enabled_rules = []

[tools.linter.options]

[tools.docs]
generate_on_build = false
format = ""
output_dir = ""
include_private = false
theme = ""

[tools.docs.options]

[tools.package_manager]
registry = ""
offline = false

[tools.package_manager.options]

[tools.compiler]
llvm_passes = []
incremental = false

[tools.compiler.debug]
enabled = true
level = 2
include_source = false
optimized = false
compress = false
split_debug_info = false
dwarf_version = 4
inline_debug = true
type_debug = true
variable_debug = true
parameter_debug = true
scope_debug = true
line_debug = true
column_debug = false

[tools.compiler.options]

[tools.targets]
