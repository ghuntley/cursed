[package]
name = "complex-cursed-project"
version = "1.0.0"
description = "A complex multi-file CURSED project for testing import and module systems"
authors = ["CURSED Team <team@cursed-lang.org>"]
license = "MIT"
repository = "https://github.com/cursed-lang/complex-project"

[dependencies]
crypto_pqc = "1.0.0"
json_parser = "2.1.0"
http_client = "0.8.0"
logging = "1.5.0"
database_orm = "3.2.0"

[dev-dependencies]
test_framework = "2.0.0"
mock_server = "1.3.0"

[build]
target = "native"
optimization_level = 2
debug_symbols = true

[features]
default = ["crypto", "networking", "database"]
crypto = ["crypto_pqc"]
networking = ["http_client"]
database = ["database_orm"]
experimental = ["beta_features"]

[workspace]
members = [
    "utils",
    "data", 
    "services",
    "config"
]
